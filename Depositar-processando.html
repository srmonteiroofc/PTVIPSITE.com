<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando Pagamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Processando</h2>
        <div style="width:70px; height:70px; border:4px solid #2a2a3a; border-top-color:var(--vermelho-principal); border-radius:50%; margin:30px auto; animation: girar 1s linear infinite"></div>
        <style>@keyframes girar { to { transform: rotate(360deg); } }</style>
        <p style="text-align:center; margin:15px 0">Aguardando confirmação do pagamento...</p>
        <p style="text-align:center; font-size:14px; color:var(--cinza-claro)">Prazo estimado: até 15 minutos</p>
        <button class="botao vermelho" onclick="irPara('depositar-sucesso.html')">VERIFICAR STATUS</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
