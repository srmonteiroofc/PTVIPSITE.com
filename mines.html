<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>PTVIP • Mines</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
180deg,
#07111d,
#08182b,
#09111b
);

color:white;

min-height:100vh;

padding:14px;

}

.topo{

display:flex;

justify-content:
space-between;

align-items:center;

margin-bottom:12px;

}

.logo{

font-size:24px;

font-weight:900;

color:#ff6b3d;

}

.saldo{

background:#020912;

padding:14px;

border-radius:18px;

text-align:center;

width:130px;

}

.saldo span{

color:#27ff9a;

font-size:24px;

font-weight:900;

}

.painel{

background:

linear-gradient(
180deg,
#0b1e35,
#0a1625
);

padding:16px;

border-radius:24px;

}

.controles{

display:flex;

gap:10px;

margin-bottom:16px;

}

select{

flex:1;

height:52px;

border:none;

border-radius:16px;

background:#112846;

color:white;

padding-left:16px;

font-size:18px;

}

.multi{

width:130px;

height:52px;

background:#ffc400;

color:black;

font-weight:900;

border-radius:16px;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

}

.tabuleiro{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:8px;

}

.casa{

aspect-ratio:1;

background:

linear-gradient(
180deg,
#163867,
#102748
);

border-radius:14px;

border:
1px solid
rgba(255,255,255,.05);

box-shadow:

inset 0 6px 18px
rgba(255,255,255,.05),

0 8px 20px
rgba(0,0,0,.35);

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

transition:.15s;

cursor:pointer;

}

.casa:active{

transform:scale(.94);

}

.aposta{

margin-top:18px;

}

.valor{

height:56px;

background:#112846;

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:18px;

margin-bottom:12px;

}

.botao{

width:100%;

height:58px;

border:none;

border-radius:20px;

background:

linear-gradient(
90deg,
#46b300,
#63e000
);

color:white;

font-size:20px;

font-weight:900;

}

.botao:active{

transform:scale(.98);

}

</style>

</head>

<body>

<div class="topo">

<div class="logo">

← Mines

</div>

<div class="saldo">

SALDO<br>

<span>

R$0,00

</span>

</div>

</div>

<div class="painel">

<div class="controles">

<select>

<option value="3">
3 Minas
</option>

<option value="5">
5 Minas
</option>

<option value="7">
7 Minas
</option>

<option value="10">
10 Minas
</option>

</select>

<div class="multi">

1.10x

</div>

</div>

<div class="tabuleiro">

<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>

<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>

<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>

<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>

<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>
<div class="casa"></div>

</div>

<div class="aposta">

<div class="valor">

R$1,00

</div>

<button class="botao">

APOSTAR

</button>

</div>

</div>

<script src="mines.js"></script>

</body>

</html>
