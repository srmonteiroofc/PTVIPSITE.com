<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Bem-vindo!</h2>
        <input type="text" placeholder="E-mail ou Telefone">
        <input type="password" placeholder="Senha">
        <button class="botao vermelho" onclick="irPara('verificacao.html')">ENTRAR</button>
        <p style="text-align:center; margin:15px 0; color:var(--cinza-claro)">Ou entre com:</p>
        <div style="display:flex; gap:10px; justify-content:center">
            <button class="botao branco" style="flex:1; padding:10px">G</button>
            <button class="botao branco" style="flex:1; padding:10px">Apple</button>
            <button class="botao branco" style="flex:1; padding:10px">Facebook</button>
        </div>
        <p style="text-align:center; margin-top:20px; color:var(--cinza-claro)">Não tem conta? <a href="cadastro.html" style="color:var(--dourado); text-decoration:none">Cadastre-se</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
