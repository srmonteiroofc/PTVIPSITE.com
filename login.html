<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center px-4 select-none">

    <div class="w-full max-w-sm glass-card border border-gray-800/80 rounded-3xl p-8 shadow-2xl relative">
        
        <div class="w-full flex justify-center mb-6">
            <img src="logo.png" alt="PTvip" class="h-16 object-contain">
        </div>

        <div class="text-center mb-6">
            <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Entre na sua conta</p>
        </div>

        <form id="loginForm" class="space-y-4">
            
            <div class="relative">
                <input type="email" id="loginEmail" placeholder="E-mail" required class="w-full bg-[#0d121a] border border-gray-800/80 rounded-xl p-4 outline-none focus:border-amber-500/50 text-white placeholder-gray-600 text-sm transition-colors">
            </div>
            
            <div class="space-y-3">
                <input type="password" id="loginPassword" placeholder="Senha" required class="w-full bg-[#0d121a] border border-gray-800/80 rounded-xl p-4 outline-none focus:border-amber-500/50 text-white placeholder-gray-600 text-sm transition-colors">
                
                <div class="flex items-center justify-between px-1 text-xs">
                    <label class="flex items-center gap-2 cursor-pointer text-gray-400 select-none">
                        <input type="checkbox" id="lembrarUsuario" class="w-4 h-4 rounded border-gray-800 bg-[#0d121a] text-amber-500 accent-amber-500 focus:ring-0 focus:ring-offset-0">
                        <span>Lembrar usuário</span>
                    </label>
                    <a href="recuperar.html" class="text-gray-400 hover:text-amber-500 transition-colors font-medium">Esqueceu a senha?</a>
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-gray-950 rounded-xl font-black uppercase tracking-wider text-xs transition-all shadow-lg shadow-amber-950/20 active:scale-[0.99] mt-2">
                Entrar
            </button>
        </form>

        <p class="text-center text-gray-500 text-xs mt-6 font-medium uppercase tracking-wider">
            Ainda não tem conta? <a href="cadastro.html" class="text-amber-500 font-black hover:underline tracking-normal normal-case ml-1 transition-colors">Cadastrar-se</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAw_X2_5ntROLBDHj6TF_rFQj6Yra-ghxk",
            authDomain: "ptvip-teste.firebaseapp.com",
            projectId: "ptvip-teste",
            storageBucket: "ptvip-teste.firebasestorage.app",
            messagingSenderId: "407028833766",
            appId: "1:407028833766:web:79d7dbf7ee968944248a27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const emailInput = document.getElementById('loginEmail');
        const lembrarCheckbox = document.getElementById('lembrarUsuario');

        // Proteção para o carregamento do LocalStorage
        document.addEventListener("DOMContentLoaded", () => {
            try {
                const emailSalvo = localStorage.getItem('ptvip_usuario_salvo');
                if (emailSalvo) {
                    emailInput.value = emailSalvo;
                    lembrarCheckbox.checked = true;
                }
            } catch (e) {
                console.warn("Acesso ao localStorage bloqueado pelo navegador.");
            }
        });

        // Lógica para ouvir o formulário de Login com Firebase
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = document.getElementById('loginPassword').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Proteção contra bloqueios de segurança do 'setItem'
                    try {
                        if (lembrarCheckbox.checked) {
                            localStorage.setItem('ptvip_usuario_salvo', email);
                        } else {
                            localStorage.removeItem('ptvip_usuario_salvo');
                        }
                    } catch (e) {
                        console.warn("Não foi possível salvar a preferência 'Lembrar usuário' neste navegador.");
                    }

                    // Login efetuado com sucesso -> vai para a home
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert("Erro ao entrar: " + error.message);
                });
        });
    </script>
</body>
</html>
