<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PTvip - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #07111d, #091625, #07111d);
        }
        .glass {
            background: rgba(18, 28, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
        }
        .card {
            transition: 0.25s;
        }
        .card:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="text-white min-h-screen pb-28">

    <header class="sticky top-0 z-50 bg-[#111827] border-b border-gray-800">
        <div class="p-5 flex items-center">
            <button onclick="window.location.href='home.html'" class="text-gray-400 text-xl">✕</button>
            <h1 class="flex-1 text-center font-black tracking-wide">CENTRO PESSOAL</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-5">
        
        <div class="glass rounded-3xl p-6 text-center">
            <h2 id="userEmail" class="font-black text-2xl tracking-wide text-gray-100">
                Carregando...
            </h2>
        </div>

        <div class="glass rounded-3xl p-5">
            <p class="text-gray-500 text-sm font-medium">Saldo Disponível</p>
            <h2 id="saldo" class="text-5xl font-black text-amber-400 mt-1">R$ 0,00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='sacar.html'" class="glass card rounded-3xl p-6 flex flex-col items-center justify-center border border-blue-900/40">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-cyan-400 flex items-center justify-center text-3xl shadow-lg">
                    💵
                </div>
                <p class="mt-4 text-center font-bold tracking-wide">Solicitar Saque</p>
            </button>

            <button onclick="window.location.href='depositar-metodo.html'" class="glass card rounded-3xl p-6 flex flex-col items-center justify-center border border-emerald-900/40">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-green-400 flex items-center justify-center text-3xl shadow-lg">
                    💰
                </div>
                <p class="mt-4 text-center font-bold tracking-wide">Efetuar Depósito</p>
            </button>
        </div>

        <div class="rounded-3xl overflow-hidden shadow-xl">
            <img src="logo.png" class="w-full h-auto block">
        </div>

        <div onclick="window.location.href='promocoes.html'" class="glass rounded-3xl p-5 card cursor-pointer">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-red-500 font-bold text-sm tracking-wider">NÍVEL VIP</p>
                    <h2 class="text-5xl font-black mt-1">V0</h2>
                </div>
                <div class="text-right">
                    <p class="text-gray-500 font-bold text-sm tracking-wider">BÔNUS</p>
                    <p class="text-emerald-400 text-2xl font-black mt-1">R$10</p>
                </div>
            </div>

            <div class="mt-5 h-2 rounded-full bg-black/50 overflow-hidden">
                <div class="w-[10%] h-full bg-gradient-to-r from-red-500 to-yellow-500"></div>
            </div>
            <p class="mt-3 text-gray-400 text-xs font-medium">Toque para ver promoções</p>
        </div>

        <button onclick="logout()" class="w-full bg-red-600/20 hover:bg-red-600/30 border border-red-600 text-red-500 py-4 rounded-3xl font-black tracking-widest transition duration-200 card">
            SAIR DA CONTA
        </button>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#111827] border-t border-gray-800 max-w-md mx-auto z-50">
        <div class="flex justify-around py-4 text-xl">
            <button onclick="window.location.href='home.html'" class="opacity-70 hover:opacity-100">🏠</button>
            <button onclick="window.location.href='promocoes.html'" class="opacity-70 hover:opacity-100">🎁</button>
            <button onclick="window.location.href='depositar-metodo.html'" class="opacity-70 hover:opacity-100">📦</button>
            <button onclick="window.location.href='sacar.html'" class="opacity-70 hover:opacity-100">💰</button>
            <button class="text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">👤</button>
        </div>
    </nav>

    <script type="module">
        // Importando a conexão direta do seu arquivo local para não perder o login
        import { auth } from "./firebase.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Verifica se o usuário está logado na mesma sessão do index.html
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuário reconhecido! Injeta o nome na tela
                document.getElementById("userEmail").innerHTML = user.email.split("@")[0];
            } else {
                // Se perder o login por algum motivo, volta pro começo
                window.location = "index.html";
            }
        });

        // Função de Sair corrigida
        window.logout = async () => {
            try {
                await signOut(auth);
                window.location = "index.html";
            } catch (error) {
                console.error("Erro ao deslogar:", error);
            }
        };
    </script>

</body>
</html>
