<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PTvip - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #07111d, #091625, #07111d);
        }
        .glass {
            background: rgba(18, 28, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px);
        }
        .card {
            transition: 0.25s;
        }
        .card:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between pb-10 select-none">

    <header class="w-full max-w-md mx-auto p-5">
        <button onclick="window.location.href='index.html'" class="text-gray-400 text-xl font-bold flex items-center gap-1 hover:text-white transition">
            ← <span class="text-sm font-normal">Voltar</span>
        </button>
    </header>

    <main class="w-full max-w-md mx-auto px-5 flex-1 flex flex-col justify-center">
        <div class="glass rounded-3xl p-8 space-y-6 shadow-2xl">
            
            <div class="text-center space-y-2">
                <img src="logo.png" alt="PTvip" class="h-16 mx-auto object-contain drop-shadow-[0_0_15px_rgba(217,119,6,0.3)]" onerror="this.style.display='none'">
                <h2 class="text-3xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-yellow-500">
                    ENTRAR NA CONTA
                </h2>
                <p class="text-gray-400 text-xs tracking-wider uppercase">Acesse sua área de jogo</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-xs font-bold tracking-wider uppercase mb-2">E-mail</label>
                    <input type="email" id="email" required autocomplete="email" placeholder="seu-email@exemplo.com" 
                        class="w-full bg-black/40 border border-gray-800 rounded-2xl px-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-amber-500 transition text-sm">
                </div>

                <div>
                    <label class="block text-gray-400 text-xs font-bold tracking-wider uppercase mb-2">Senha</label>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" 
                        class="w-full bg-black/40 border border-gray-800 rounded-2xl px-4 py-3.5 text-white placeholder-gray-600 focus:outline-none focus:border-amber-500 transition text-sm">
                </div>

                <button type="submit" class="w-full mt-2 bg-gradient-to-r from-amber-500 to-yellow-500 text-black py-4 rounded-2xl font-black tracking-widest text-sm transition duration-200 card hover:opacity-90 shadow-lg shadow-amber-500/10">
                    ENTRAR
                </button>
            </form>

            <p class="text-center text-gray-400 text-xs">
                Não tem uma conta? 
                <a href="cadastro.html" class="text-amber-400 font-bold hover:underline">Criar conta</a>
            </p>

        </div>
    </main>

    <script type="module">
        // Importando com 'f' minúsculo para evitar erro 404 no GitHub Pages
        import { auth } from "./firebase.js"; 
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const loginForm = document.getElementById("loginForm");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            try {
                // Efetua a autenticação
                await signInWithEmailAndPassword(auth, email, password);
                
                // CORREÇÃO: Direciona direto para a home.html (Tela do Jogo)
                window.location.href = "home.html";
            } catch (error) {
                console.error("Erro de login:", error);
                
                // Avisos organizados de erro na digitação
                if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                    alert("E-mail ou senha incorretos. Por favor, verifique.");
                } else if (error.code === "auth/invalid-email") {
                    alert("Formato de e-mail inválido.");
                } else {
                    alert("Erro ao conectar. Verifique sua conexão com a internet.");
                }
            }
        });
    </script>
</body>
</html>
