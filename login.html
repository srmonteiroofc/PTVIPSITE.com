<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Centro Pessoal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #07111d, #091625, #07111d);
        }
        .glass {
            background: rgba(18,28,40,.95);
            border: 1px solid rgba(255,255,255,.06);
            backdrop-filter: blur(14px);
        }
        .card {
            transition: .25s;
        }
        .card:active {
            transform: scale(.97);
        }
        /* Estilos para gradientes de botão */
        .btn-sacar {
            background: linear-gradient(135deg, #0f2d57, #07111d);
            border-color: #1e3a8a;
        }
        .btn-depositar {
            background: linear-gradient(135deg, #064e3b, #042f22);
            border-color: #059669;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen pb-28">

    <header class="sticky top-0 z-50 bg-[#111827] border-b border-gray-800">
        <div class="p-5 flex items-center">
            <button onclick="window.location.href='home.html'" class="text-gray-400">✕</button>
            <h1 class="flex-1 text-center font-black text-lg tracking-wide">CENTRO PESSOAL</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-5">
        
        <div class="glass rounded-3xl p-6 text-center">
            <div class="flex flex-col items-center gap-2">
                <h2 id="userDisplay" class="font-black text-2xl tracking-wide">miguelmonteiro.300701</h2>
                <div class="flex items-center gap-1.5 text-xs text-amber-300">
                    <div class="w-6 h-6 rounded-md bg-gradient-to-br from-yellow-500 to-amber-300 flex items-center justify-center text-sm">👑</div>
                    <span>V0 VIP</span>
                </div>
            </div>
        </div>

        <div class="glass rounded-3xl p-6">
            <p class="text-gray-500 text-sm">Saldo Disponível</p>
            <h2 id="saldoDisplay" class="text-6xl font-black text-amber-400">R$ 0,00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.href='sacar.html'" class="glass card btn-sacar rounded-3xl p-6 border flex flex-col items-center">
                <div class="w-20 h-20 rounded-2xl bg-[#1e40af] flex items-center justify-center text-5xl mb-4 shadow-inner">💵</div>
                <p class="text-center font-semibold text-lg">Solicitar Saque</p>
            </button>

            <button onclick="window.location.href='depositar-metodo.html'" class="glass card btn-depositar rounded-3xl p-6 border flex flex-col items-center">
                <div class="w-20 h-20 rounded-2xl bg-[#15803d] flex items-center justify-center text-5xl mb-4 shadow-inner">💰</div>
                <p class="text-center font-semibold text-lg">Efetuar Depósito</p>
            </button>
        </div>

        <div class="rounded-3xl overflow-hidden glass p-1 shadow-2xl">
            <img src="banner-perfil.png" alt="PTvip Premium - Jogue. Vença. Seja VIP." class="w-full h-auto object-cover">
        </div>

        <div onclick="window.location.href='promocoes.html'" class="glass rounded-3xl p-6 card cursor-pointer">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-red-500 text-sm font-semibold">NÍVEL VIP</p>
                    <h2 class="text-6xl font-black">V0</h2>
                </div>
                <div>
                    <p class="text-gray-500 text-sm font-semibold">BÔNUS</p>
                    <p class="text-emerald-400 text-3xl font-black">R$10</p>
                </div>
            </div>
            <div class="mt-6 h-2 rounded-full bg-black overflow-hidden relative">
                <div id="progressoVip" class="absolute inset-y-0 left-0 h-full bg-gradient-to-r from-red-600 to-yellow-500" style="width: 10%;"></div>
            </div>
            <p class="mt-4 text-gray-400 text-sm">Toque para ver promoções</p>
        </div>

        <button onclick="logout()" class="w-full glass card rounded-2xl py-4 border border-red-900 flex items-center justify-center gap-2 group hover:bg-red-950/20 transition duration-300">
            <span class="text-red-500 text-lg group-hover:scale-110 transition">⍈</span>
            <span class="text-red-500 font-bold uppercase tracking-widest text-sm">Sair da Conta</span>
        </button>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#111827] border-t border-gray-800 max-w-md mx-auto z-50">
        <div class="flex justify-around py-4">
            <button onclick="window.location.href='home.html'" class="p-3 text-gray-600 hover:text-white">🏠</button>
            <button onclick="window.location.href='promocoes.html'" class="p-3 text-gray-600 hover:text-white">🎁</button>
            <button onclick="window.location.href='depositar.html'" class="p-3 text-gray-600 hover:text-white">📦</button>
            <button onclick="window.location.href='sacar.html'" class="p-3 text-gray-600 hover:text-white">💰</button>
            <button class="p-3 text-blue-500 flex items-center gap-1.5 font-bold">
                <div class="w-5 h-5 rounded-full bg-blue-500"></div>
                👤
            </button>
        </div>
    </nav>

    <script type="module" src="firebase-perfil.js"></script>
    <script>
        // Função de logout simulada (deve ser tratada no firebase-perfil.js real)
        function logout() {
            window.alert("Saindo... (Funcionalidade simulada)");
            window.location = "index.html"; // Redireciona para o login
        }
    </script>
</body>
</html>
