<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTVIP • Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f141a;
            min-height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .card { 
            background: #1a2027; 
            border: 1px solid #374151;
            border-radius: 16px;
        }
        .btn-deposit {
            background: #e68a00;
            color: #000;
            transition: all 0.3s;
        }
        .btn-deposit:hover { background: #d47e00; }
        .btn-withdraw {
            background: #2d3748;
            color: white;
            transition: all 0.3s;
        }
        .btn-withdraw:hover { background: #3d4b5e; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="mb-6 flex justify-center">
            <img src="logo.png" alt="PTVIP" class="h-16 w-auto">
        </div>

        <!-- Header: Nome e Saldo -->
        <div class="card p-4 flex justify-between items-center mb-4">
            <div>
                <p class="text-gray-400 text-[10px] uppercase tracking-widest">Olá,</p>
                <h3 class="font-bold text-lg">Usuário</h3>
            </div>
            <div class="text-right">
                <p class="text-gray-400 text-[10px] uppercase tracking-widest">Saldo Atual</p>
                <h3 class="text-[#e68a00] font-bold text-xl">R$ 0,00</h3>
            </div>
        </div>

        <!-- Área de Nível VIP -->
        <div class="card p-5">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-black uppercase text-sm">Nível VIP 0</h3>
                <span class="text-[#e68a00] text-[9px] font-bold uppercase bg-[#e68a00]/10 px-2 py-1 rounded">
                    +10$ Recompensa
                </span>
            </div>
            
            <!-- Barra de Progresso -->
            <div class="w-full bg-[#0f141a] h-3 rounded-full border border-gray-700 overflow-hidden">
                <div class="bg-[#e68a00] h-full w-[0%] transition-all duration-500"></div>
            </div>
            <p class="text-gray-400 text-[10px] mt-2 font-medium">0 / 200 até o próximo nível</p>
        </div>

        <!-- Botões de Ação -->
        <div class="grid grid-cols-2 gap-3 mt-4">
            <button class="btn-deposit py-4 font-black uppercase text-xs rounded-xl shadow-lg active:scale-[0.98]">
                Depósito
            </button>
            <button class="btn-withdraw py-4 font-black uppercase text-xs rounded-xl active:scale-[0.98]">
                Saque
            </button>
        </div>
    </div>

</body>
</html>
