<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Minha Carteira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-app-dark { background-color: #070707; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .gold-text-gradient { background: linear-gradient(135deg, #FFE082 0%, #D4AF37 50%, #8C6212 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gradient-red { background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%); }
        .btn-gradient-gold { background: linear-gradient(180deg, #D4AF37 0%, #AA7C11 100%); }
    </style>
</head>
<body class="bg-app-dark text-white font-sans min-h-screen flex flex-col items-center p-4 pb-24">

    <div class="w-full max-w-sm gold-border rounded-3xl p-6 bg-[#0f0f0f] shadow-2xl mt-4">
        
        <div class="flex items-center justify-between mb-8">
            <button type="button" onclick="window.location.href='home.html'" class="p-2 bg-neutral-900 rounded-full hover:bg-neutral-800 transition">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <div class="text-center flex-1 -ml-10">
                <h1 class="text-2xl font-black uppercase"><span class="gold-text-gradient">PT</span><span class="text-red-600">vip</span></h1>
                <h2 class="text-[10px] font-bold mt-1 text-gray-500 uppercase tracking-widest">Carteira Digital</h2>
            </div>
        </div>

        <div class="bg-gradient-to-b from-[#161616] to-[#0b0b0b] border border-neutral-800/80 rounded-2xl p-6 text-center mb-6 shadow-lg">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Saldo Disponível</p>
            <div class="text-3xl font-black text-amber-500 mb-2" id="saldoCarteira">R$ 0,00</div>
            <p class="text-[9px] text-emerald-400 uppercase tracking-wider font-bold">● Conta Ativa e Verificada</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button type="button" onclick="window.location.href='Depositar-valor.html'" class="btn-gradient-red py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 transition">
                ➕ Depositar
            </button>
            <button type="button" onclick="window.location.href='Sacar.html'" class="btn-gradient-gold py-4 rounded-xl font-black uppercase tracking-widest text-xs text-black shadow-lg active:scale-95 transition">
                💸 Sacar Saldo
            </button>
        </div>

        <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3">Atividades Recentes</p>
            <div class="space-y-2">
                
                <div class="bg-[#141414] border border-neutral-900 rounded-xl p-3 flex items-center justify-between text-xs">
                    <div>
                        <p class="font-bold">Depósito Instantâneo</p>
                        <p class="text-[10px] text-gray-600">Via PIX • Processado</p>
                    </div>
                    <span class="text-emerald-500 font-bold">+ R$ 50,00</span>
                </div>

                <div class="bg-[#141414] border border-neutral-900 rounded-xl p-3 flex items-center justify-between text-xs">
                    <div>
                        <p class="font-bold">Bônus de Boas-Vindas</p>
                        <p class="text-[10px] text-gray-600">Campanha Ativa • Creditado</p>
                    </div>
                    <span class="text-amber-500 font-bold">+ R$ 20,00</span>
                </div>

            </div>
        </div>

        <p class="text-center text-[9px] text-gray-700 uppercase tracking-widest mt-8">Transações protegidas por criptografia ponta a ponta</p>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a] border-t border-neutral-900 h-16 flex justify-around items-center z-50">
        <a href="home.html" class="flex flex-col items-center text-gray-500"><span class="text-xl">🏠</span></a>
        <a href="Jogos.html" class="flex flex-col items-center text-gray-500"><span class="text-xl">🎮</span></a>
        <a href="Depositar-valor.html" class="bg-red-600 p-3 rounded-full -mt-8 border-4 border-[#070707] shadow-lg">💳</a>
        <a href="Promocoes.html" class="flex flex-col items-center text-gray-500"><span class="text-xl">🎁</span></a>
        <a href="Perfil.html" class="flex flex-col items-center text-gray-500"><span class="text-xl">👤</span></a>
    </div>

    <script>
        // Puxa o saldo real salvo no localStorage que definimos na tela de sucesso
        const saldoSalvo = localStorage.getItem('saldoUsuario') || '0.00';
        // Formata o número para exibição brasileira (ex: 50.00 vira R$ 50,00)
        const saldoFormatado = parseFloat(saldoSalvo).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('saldoCarteira').innerText = saldoFormatado;
    </script>
</body>
</html>
