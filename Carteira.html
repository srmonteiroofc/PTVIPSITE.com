<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira - PT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Carteira</h2>
        <div style="background: linear-gradient(90deg, var(--vermelho-principal), #900000); padding:20px; border-radius:12px; margin:20px 0">
            <p>Saldo disponível</p>
            <h3 style="font-size:28px; margin:10px 0">R$ 250,00</h3>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="botao vermelho" style="flex:1; padding:8px" onclick="irPara('depositar-valor.html')">DEPOSITAR</button>
                <button class="botao branco" style="flex:1; padding:8px">SACAR</button>
            </div>
        </div>

        <h4 style="text-align:left; margin:20px 0 10px">Movimentações</h4>
        <div style="background:#1a1a28; padding:14px; border-radius:8px; margin:8px 0; display:flex; justify-content:space-between; align-items:center">
            <span>Depósito PIX</span>
            <span style="color:#22dd66">+ R$100,00</span>
        </div>
        <div style="background:#1a1a28; padding:14px; border-radius:8px; margin:8px 0; display:flex; justify-content:space-between; align-items:center">
            <span>Aposta - Jogos</span>
            <span style="color:#ff5555">- R$25,00</span>
        </div>
        <div style="background:#1a1a28; padding:14px; border-radius:8px; margin:8px 0; display:flex; justify-content:space-between; align-items:center">
            <span>Ganho Bônus</span>
            <span style="color:#22dd66">+ R$50,00</span>
        </div>

        <div class="menu-navegacao">
            <div class="nav-item" onclick="irPara('home.html')">Início</div>
            <div class="nav-item" onclick="irPara('jogos.html')">Jogos</div>
            <div class="nav-item ativo">Carteira</div>
            <div class="nav-item" onclick="irPara('perfil.html')">Perfil</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
