<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Programa VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-gradient { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); }
        .text-gold { color: #FFD700; }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto pt-6 px-4">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-widest text-white">PT<span class="text-red-600">vip</span></h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mt-1">Programa de Recompensas</p>
        </div>

        <!-- Card de Convite -->
        <div class="glass rounded-3xl p-6 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10">
                <svg class="w-24 h-24 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>

            <h2 class="text-lg font-bold mb-4">Convide e Ganhe</h2>
            
            <div class="flex gap-4 items-center">
                <div class="bg-white p-1 rounded-2xl">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.ptvip.com/join?id=987654321" class="w-20 h-20 rounded-xl">
                </div>
                <div class="flex-1">
                    <div class="bg-black/40 rounded-xl p-3 border border-white/5 mb-2">
                        <p class="text-[9px] uppercase text-gray-500 mb-1">Seu Código</p>
                        <div class="flex justify-between items-center">
                            <span class="font-mono font-bold text-yellow-500">987654321</span>
                            <button onclick="navigator.clipboard.writeText('987654321')" class="text-xs bg-yellow-500/10 px-2 py-1 rounded">Copiar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Botões de Compartilhar -->
            <div class="grid grid-cols-4 gap-2 mt-4">
                <button class="glass p-3 rounded-xl flex justify-center hover:bg-white/10 transition-all">🔗</button>
                <button class="glass p-3 rounded-xl flex justify-center text-blue-400 hover:bg-blue-500/20 transition-all">f</button>
                <button class="glass p-3 rounded-xl flex justify-center text-green-400 hover:bg-green-500/20 transition-all">💬</button>
                <button class="glass p-3 rounded-xl flex justify-center text-sky-400 hover:bg-sky-500/20 transition-all">✈</button>
            </div>
        </div>

        <!-- Estatísticas -->
        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="glass p-4 rounded-2xl text-center">
                <span class="block text-xl font-black text-yellow-500">0</span>
                <span class="text-[9px] uppercase text-gray-400">Indicados</span>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <span class="block text-xl font-black text-green-500">R$ 0,00</span>
                <span class="text-[9px] uppercase text-gray-400">Ganhos</span>
            </div>
        </div>

        <!-- Progresso VIP -->
        <div class="mt-8">
            <h3 class="text-xs font-black uppercase text-gray-400 mb-4 tracking-widest">Níveis de Recompensa</h3>
            <div class="space-y-3">
                <!-- Nível 1 -->
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full gold-gradient flex items-center justify-center font-black">1</div>
                        <div>
                            <p class="text-xs font-bold">3 Amigos</p>
                            <p class="text-[9px] text-gray-500">Recompensa: R$ 15,00</p>
                        </div>
                    </div>
                    <button class="bg-white/10 text-[10px] px-3 py-1 rounded-full font-bold uppercase">Bloqueado</button>
                </div>
                <!-- Nível 2 -->
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center font-black text-gray-500">2</div>
                        <div>
                            <p class="text-xs font-bold">8 Amigos</p>
                            <p class="text-[9px] text-gray-500">Recompensa: R$ 40,00</p>
                        </div>
                    </div>
                    <button class="bg-white/10 text-[10px] px-3 py-1 rounded-full font-bold uppercase">Bloqueado</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
