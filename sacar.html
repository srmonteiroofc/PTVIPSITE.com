<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Solicitar Saque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center px-4 select-none">

    <!-- CARD PRINCIPAL DE RETIRADA -->
    <div class="w-full max-w-md glass-card border border-gray-800/80 rounded-3xl p-6 shadow-2xl relative">
        
        <!-- HEADER DO CARD COM SETA PARA HOME -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='home.html'" class="w-9 h-9 rounded-full bg-[#141b26] border border-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">Retirada de Saldo</span>
            <div class="w-9"></div> <!-- Equilíbrio do Flexbox -->
        </div>

        <!-- LOGO CENTRALIZADA EM DESTAQUE -->
        <div class="w-full flex justify-center mb-6">
            <img src="logo.png" alt="PTvip" class="h-14 object-contain">
        </div>

        <!-- EXIBIÇÃO DE SALDO DISPONÍVEL -->
        <div class="bg-[#0d121a] border border-gray-800/80 rounded-xl px-4 py-3 flex justify-between items-center mb-6">
            <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Seu Saldo Disponível:</span>
            <span class="text-base font-black text-amber-500">R$ 0,00</span>
        </div>

        <!-- FORMULÁRIO DE SAQUE -->
        <div class="space-y-4">
            
            <!-- TIPO DE CHAVE -->
            <div class="space-y-1.5">
                <label class="text-[11px] font-black uppercase tracking-wider text-gray-500 block">Tipo de Chave PIX</label>
                <div class="relative">
                    <select class="w-full bg-[#0d121a] border border-gray-800 rounded-xl px-4 py-3.5 text-sm font-bold text-gray-300 focus:outline-none focus:border-amber-500/50 appearance-none cursor-pointer">
                        <option value="cpf">CPF</option>
                        <option value="telefone">Telefone</option>
                        <option value="email">E-mail</option>
                        <option value="chave_aleatoria">Chave Aleatória</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <!-- CAMPO CHAVE PIX -->
            <div class="space-y-1.5">
                <label class="text-[11px] font-black uppercase tracking-wider text-gray-500 block">Insira sua Chave PIX</label>
                <input type="text" placeholder="Digite sua chave aqui" class="w-full bg-[#0d121a] border border-gray-800 rounded-xl px-4 py-3.5 text-sm font-medium text-white placeholder-gray-600 focus:outline-none focus:border-amber-500/50">
            </div>

            <!-- VALOR DO SAQUE -->
            <div class="space-y-1.5">
                <label class="text-[11px] font-black uppercase tracking-wider text-gray-500 block">Valor do Saque</label>
                <div class="relative">
                    <input type="number" step="0.01" placeholder="0.00" class="w-full bg-[#0d121a] border border-gray-800 rounded-xl px-4 py-3.5 text-base font-black text-white placeholder-gray-700 focus:outline-none focus:border-amber-500/50">
                </div>
                <p class="text-[10px] text-gray-600 text-right font-bold">Mínimo para retirada: <span class="text-gray-500">R$ 20,00</span></p>
            </div>

            <!-- BOTÃO DE CONFIRMAÇÃO PREMIUM -->
            <button class="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-gray-950 rounded-xl font-black uppercase tracking-wider text-xs transition-all shadow-lg shadow-amber-950/20 active:scale-[0.99] mt-2">
                Confirmar Saque Instantâneo
            </button>

            <!-- NOTA DE RODAPÉ SUTIL -->
            <p class="text-[9px] text-center font-bold tracking-widest text-gray-600 uppercase pt-2">
                Pagamentos processados via PIX em até 5 minutos
            </p>

        </div>
    </div>

</body>
</html>
