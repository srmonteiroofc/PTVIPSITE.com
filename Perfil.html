<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-app-dark { background-color: #0b0b0b; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.2); }
        .gold-text-gradient { background: linear-gradient(135deg, #FFE082 0%, #D4AF37 50%, #8C6212 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-app-dark text-white font-sans min-h-screen pb-24">

    <div class="max-w-md mx-auto pt-8 px-4">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-20 h-20 rounded-full border-2 border-amber-500/30 flex items-center justify-center text-3xl mb-3 bg-neutral-900">
                👤
            </div>
            <h2 class="text-lg font-bold">Usuário Registrado</h2>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <a href="Depositar-valor.html" class="glass-card gold-border p-4 rounded-2xl text-center hover:bg-neutral-900 transition">
                <div class="text-xl mb-1">💳</div>
                <p class="text-[10px] font-bold uppercase">Depositar</p>
            </a>
            <a href="#" class="glass-card gold-border p-4 rounded-2xl text-center hover:bg-neutral-900 transition">
                <div class="text-xl mb-1">💸</div>
                <p class="text-[10px] font-bold uppercase">Sacar</p>
            </a>
        </div>

        <div class="glass-card gold-border rounded-2xl p-2 space-y-1">
            <div class="w-full p-4 flex items-center justify-between rounded-xl opacity-70">
                <span class="flex items-center gap-3 text-sm"><span class="text-lg">📋</span> Histórico de Apostas</span>
                <span class="text-gray-500">&gt;</span>
            </div>
            
            <button class="w-full p-4 flex items-center justify-between hover:bg-neutral-900 rounded-xl transition">
                <span class="flex items-center gap-3 text-sm"><span class="text-lg">🛡️</span> Segurança e Conta</span>
                <span class="text-gray-500">&gt;</span>
            </button>
            
            <a href="https://www.reclameaqui.com.br/" target="_blank" class="w-full p-4 flex items-center justify-between hover:bg-neutral-900 rounded-xl transition">
                <span class="flex items-center gap-3 text-sm"><span class="text-lg">❓</span> Suporte 24/7</span>
                <span class="text-gray-500">&gt;</span>
            </a>
            
            <a href="login.html" class="w-full p-4 flex items-center justify-between text-red-500 hover:bg-neutral-900 rounded-xl transition">
                <span class="flex items-center gap-3 text-sm"><span class="text-lg">🚪</span> Sair da conta</span>
            </a>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#121212] border-t border-neutral-800 h-20 flex justify-around items-center z-50">
        <a href="home.html" class="flex flex-col items-center gap-1 text-gray-500"><span class="text-lg">🏠</span><span class="text-[9px] font-bold">Início</span></a>
        <a href="Jogos.html" class="flex flex-col items-center gap-1 text-gray-500"><span class="text-lg">🎮</span><span class="text-[9px] font-bold">Jogos</span></a>
        <a href="Depositar-valor.html" class="bg-red-600 w-12 h-12 rounded-full -mt-6 border-4 border-[#0b0b0b] flex items-center justify-center">💳</a>
        <a href="Promocoes.html" class="flex flex-col items-center gap-1 text-gray-500"><span class="text-lg">🎁</span><span class="text-[9px] font-bold">Promoções</span></a>
        <a href="Perfil.html" class="flex flex-col items-center gap-1 text-red-500"><span class="text-lg">👤</span><span class="text-[9px] font-bold">Perfil</span></a>
    </div>

</body>
</html>
