<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d121a; }
        .glass-card { background: rgba(24, 32, 44, 0.75); backdrop-filter: blur(8px); }
        .carousel-slide { display: none; }
        .carousel-slide.active { display: block; }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col pb-24 select-none">

    <!-- HEADER SUPERIOR -->
    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <!-- LOGO NO TOPO -->
        <img src="logo.png" alt="PTVIP" class="h-8 object-contain">
        
        <div class="flex items-center gap-2.5">
            <div class="bg-[#0d121a] border border-gray-800 rounded-xl px-3 py-2 flex items-center gap-1.5">
                <span class="text-[10px] font-black text-gray-500 uppercase">BR</span>
                <span class="text-sm font-black text-gray-200">R$ 0,00</span>
            </div>
            <button onclick="window.location.href='depositar-metodo.html'" class="bg-amber-600 hover:bg-amber-500 active:scale-95 text-black font-black text-xs px-4 py-2.5 rounded-xl uppercase tracking-wider transition-all shadow-lg shadow-amber-900/20">
                Depositar
            </button>
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto px-4 py-4 space-y-5">

        <!-- CARROSSEL (USANDO AS MESMAS IMAGENS) -->
        <section class="relative w-full rounded-2xl overflow-hidden aspect-[16/9] shadow-2xl border border-gray-800/40">
            <div class="carousel-slide active h-full w-full relative">
                <img src="mines.png" class="w-full h-full object-cover">
            </div>
            <div class="carousel-slide h-full w-full relative">
                <img src="double.png" class="w-full h-full object-cover">
            </div>
            <div class="carousel-slide h-full w-full relative">
                <img src="crash.png" class="w-full h-full object-cover">
            </div>
        </section>

        <!-- SEÇÃO: ORIGINAIS -->
        <section class="space-y-3">
            <h3 class="text-sm font-black uppercase tracking-wider text-gray-200">🕹️ Originais da PTVIP</h3>

            <!-- GRID DOS JOGOS -->
            <div class="grid grid-cols-2 gap-3">
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all group">
                    <img src="mines.png" class="w-full h-32 object-cover">
                    <div class="p-3 bg-[#141b26]/80"><p class="font-black text-xs">Mines</p></div>
                </div>
                <div onclick="window.location.href='double.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all group">
                    <img src="double.png" class="w-full h-32 object-cover">
                    <div class="p-3 bg-[#141b26]/80"><p class="font-black text-xs">Double</p></div>
                </div>
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all group col-span-2">
                    <img src="crash.png" class="w-full h-40 object-cover">
                    <div class="p-3 bg-[#141b26]/80"><p class="font-black text-xs">Crash Multiplier</p></div>
                </div>
            </div>
        </section>
    </main>

    <!-- NAVEGAÇÃO -->
    <nav class="bg-[#141b26] border-t border-gray-800/80 fixed bottom-0 left-0 right-0 py-2 px-4 flex justify-around items-center z-50 max-w-md mx-auto shadow-2xl">
        <button onclick="window.location.href='home.html'" class="text-amber-500 flex flex-col items-center gap-1 font-bold text-[10px]">
            <span>Início</span>
        </button>
        <button onclick="window.location.href='perfil.html'" class="text-gray-400 hover:text-white flex flex-col items-center gap-1 font-bold text-[10px]">
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        function changeSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(changeSlide, 3000);
    </script>
</body>
</html>
