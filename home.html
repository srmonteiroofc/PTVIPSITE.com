    <style>
        /* Fundo escuro premium baseado no design do app */
        .bg-app-dark {
            background-color: #0b0b0b;
        }
        
        /* Gradiente dourado metálico para logos e detalhes VIP */
        .gold-text-gradient {
            background: linear-gradient(135deg, #FFE082 0%, #D4AF37 50%, #8C6212 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gradiente vermelho para botões principais */
        .btn-gradient-red {
            background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        /* Estilo dos Cards das Provedoras com Imagem de Fundo */
        .provider-card {
            background-size: cover;
            background-position: center;
            position: relative;
            transition: all 0.25s ease;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Camada escura por cima da imagem para dar leitura ao texto */
        .provider-overlay {
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(7,7,7,0.85) 100%);
        }

        .provider-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-3px);
        }

        /* Barra de navegação inferior fixa */
        .bottom-nav {
            background-color: #121212;
            border-top: 1px solid #1f1f1f;
        }

        /* Ocultar barra de rolagem lateral */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
