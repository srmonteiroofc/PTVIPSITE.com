<script>
const slides = [...document.querySelectorAll(".carousel-slide")];
const dots = [...document.querySelectorAll(".dot")];
const lista = document.querySelector(".divide-y");

let slide = 0;

function trocar(i){
    slides[slide].classList.remove("active");
    dots[slide].classList.replace("bg-white","bg-white/40");

    slide = i;

    slides[slide].classList.add("active");
    dots[slide].classList.replace("bg-white/40","bg-white");
}

setInterval(()=>{
    trocar((slide+1)%slides.length);
},4000);

dots.forEach((d,i)=>
    d.onclick=()=>trocar(i)
);

const usuarios = [
"Rafa***",
"Bruno_vip",
"Gabi_tx",
"Pedro_ok",
"Lucas***",
"Ana_poker",
"Vini_gold"
];

const jogos=[
"Mines",
"Double",
"Crash"
];

function novaVitoria(){

const item=document.createElement("div");

item.className=
"px-4 py-3 flex justify-between items-center bg-[#141b26]/20";

item.innerHTML=`
<div>
<p class="font-bold">${jogos[Math.floor(Math.random()*jogos.length)]}</p>
<p class="text-[10px] text-gray-500">
Usuário:
${usuarios[Math.floor(Math.random()*usuarios.length)]}
</p>
</div>

<div class="text-right">
<p class="text-emerald-400 font-black">
R$ ${(20+Math.random()*2480)
.toFixed(2)
.replace(".",",")}
</p>

<p class="text-[9px] text-gray-500">
Agora mesmo
</p>
</div>
`;

lista.prepend(item);

while(lista.children.length>4){
lista.lastElementChild.remove();
}

setTimeout(
novaVitoria,
3000+Math.random()*3000
);

}

setTimeout(novaVitoria,2500);
</script>
