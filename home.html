<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d121a; }
        .glass-card { background: rgba(24, 32, 44, 0.75); backdrop-filter: blur(8px); }
        .carousel-slide { display: none; }
        .carousel-slide.active { display: block; }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col pb-24 select-none">

    <!-- HEADER SUPERIOR -->
    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-1.5">
            <h1 class="text-xl font-black uppercase tracking-wider">PT<span class="text-red-600">vip</span>👑</h1>
        </div>
        
        <div class="flex items-center gap-2.5">
            <div class="bg-[#0d121a] border border-gray-800 rounded-xl px-3 py-2 flex items-center gap-1.5">
                <span class="text-[10px] font-black text-gray-500 uppercase">BR</span>
                <span class="text-sm font-black text-gray-200">R$ 0,00</span>
            </div>
            <button onclick="window.location.href='depositar-metodo.html'" class="bg-[#ff0000] hover:bg-red-700 active:scale-95 text-white font-black text-xs px-4 py-2.5 rounded-xl uppercase tracking-wider transition-all shadow-lg shadow-red-600/20">
                Depositar
            </button>
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto px-4 py-4 space-y-5">

        <!-- CARROSSEL COM IMAGENS -->
        <section class="relative w-full rounded-2xl overflow-hidden aspect-[16/9] shadow-2xl border border-gray-800/40">
            <div class="carousel-slide active h-full w-full relative">
                <img src="assets/mines-banner.png" onerror="this.src='https://via.placeholder.com/400x225?text=Mines'" class="w-full h-full object-cover">
            </div>
            <div class="carousel-slide h-full w-full relative">
                <img src="assets/double-banner.png" onerror="this.src='https://via.placeholder.com/400x225?text=Double'" class="w-full h-full object-cover">
            </div>
            <div class="carousel-slide h-full w-full relative">
                <img src="assets/crash-banner.png" onerror="this.src='https://via.placeholder.com/400x225?text=Crash'" class="w-full h-full object-cover">
            </div>
            <div class="absolute top-3 right-3 flex gap-1 z-20">
                <div class="dot w-1.5 h-1.5 rounded-full bg-white transition-all"></div>
                <div class="dot w-1.5 h-1.5 rounded-full bg-white/40 transition-all"></div>
                <div class="dot w-1.5 h-1.5 rounded-full bg-white/40 transition-all"></div>
            </div>
        </section>

        <!-- SEÇÃO: ORIGINAIS -->
        <section class="space-y-3">
            <h3 class="text-sm font-black uppercase tracking-wider text-gray-200">🕹️ Originais da PTVIP</h3>

            <div class="grid grid-cols-2 gap-3">
                <!-- MINES -->
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all">
                    <img src="mines.png" onerror="this.style.display='none'" class="w-full aspect-[4/3] object-cover bg-gray-900">
                    <div class="p-3"><p class="font-black text-xs text-gray-200">Mines</p></div>
                </div>
                <!-- DOUBLE -->
                <div onclick="window.location.href='double.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all">
                    <img src="double.png" onerror="this.style.display='none'" class="w-full aspect-[4/3] object-cover bg-gray-900">
                    <div class="p-3"><p class="font-black text-xs text-gray-200">Double</p></div>
                </div>
                <!-- CRASH -->
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-all col-span-2">
                    <img src="crash.png" onerror="this.style.display='none'" class="w-full aspect-[21/9] object-cover bg-gray-900">
                    <div class="p-3 flex justify-between items-center"><p class="font-black text-xs">Crash</p><span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-lg font-black uppercase">Jogar</span></div>
                </div>
            </div>
        </section>
        
        <!-- (Restante do conteúdo mantém igual...) -->
    </main>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.dot');
        function changeSlide() {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.replace('bg-white', 'bg-white/40');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.replace('bg-white/40', 'bg-white');
        }
        setInterval(changeSlide, 3000);
    </script>
</body>
</html>
