<script>

let atual=0;

const slides=
document
.querySelectorAll(
".carousel-slide"
);

const dots=
document
.querySelectorAll(
".dot"
);

function trocar(i){

slides.forEach(
s=>
s.classList
.remove(
"active"
)
);

dots.forEach(
d=>{

d.classList
.remove(
"bg-white"
);

d.classList
.add(
"bg-white/40"
);

}
);

slides[i]
.classList
.add(
"active"
);

dots[i]
.classList
.remove(
"bg-white/40"
);

dots[i]
.classList
.add(
"bg-white"
);

atual=i;

}

setInterval(()=>{

atual++;

if(
atual>=slides.length
)

atual=0;

trocar(
atual
);

},3500);

</script>
