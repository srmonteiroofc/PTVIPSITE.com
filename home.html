<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d121a; }
        .glass-card { background: rgba(24, 32, 44, 0.75); }
    </style>
</head>
<body class="text-white font-sans min-h-screen pb-20">

    <!-- HEADER ORIGINAL -->
    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <img src="logo.png" alt="PTVIP" class="h-8">
        <div class="flex items-center gap-2">
            <span class="text-sm font-bold">R$ 0,00</span>
            <button class="bg-red-600 px-4 py-1.5 rounded text-xs font-black uppercase">Depositar</button>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <!-- BANNER DE DESTAQUE -->
        <div class="bg-gradient-to-r from-red-900 to-black p-4 rounded-lg border border-red-500/20">
            <p class="text-[10px] text-red-500 font-bold uppercase">Destaque</p>
            <h2 class="text-lg font-black">MINES PTVIP</h2>
            <p class="text-[10px] opacity-70">Abra os campos certos e multiplique sua banca!</p>
        </div>

        <!-- SEÇÃO JOGOS -->
        <h3 class="text-xs font-black uppercase flex items-center gap-2">🕹️ Originais da PTVIP</h3>

        <div class="grid grid-cols-2 gap-3">
            <!-- MINES -->
            <div onclick="window.location.href='jogos.html'" class="bg-[#1b222d] rounded-lg overflow-hidden border border-gray-700 cursor-pointer">
                <img src="mines.png" class="w-full h-32 object-cover">
                <div class="p-2">
                    <p class="text-xs font-bold">Mines</p>
                    <p class="text-[9px] opacity-50">PTvip Studio</p>
                </div>
            </div>

            <!-- DOUBLE -->
            <div onclick="window.location.href='double.html'" class="bg-[#1b222d] rounded-lg overflow-hidden border border-gray-700 cursor-pointer">
                <img src="double.png" class="w-full h-32 object-cover">
                <div class="p-2">
                    <p class="text-xs font-bold">Double</p>
                    <p class="text-[9px] opacity-50">PTvip Studio</p>
                </div>
            </div>

            <!-- CRASH -->
            <div onclick="window.location.href='jogos.html'" class="bg-[#1b222d] rounded-lg overflow-hidden border border-gray-700 cursor-pointer col-span-2">
                <img src="crash.png" class="w-full h-40 object-cover">
                <div class="p-2 flex justify-between items-center">
                    <div>
                        <p class="text-xs font-bold">Crash</p>
                        <p class="text-[9px] opacity-50">PTvip Studio</p>
                    </div>
                    <button class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">JOGAR</button>
                </div>
            </div>
        </div>
    </main>

    <!-- NAVEGAÇÃO INFERIOR ORIGINAL -->
    <nav class="bg-[#141b26] border-t border-gray-800 fixed bottom-0 w-full py-3 flex justify-around items-center text-[10px] font-bold">
        <button class="text-red-500 flex flex-col items-center"><span>Começar</span></button>
        <button class="text-gray-500 flex flex-col items-center"><span>Ofertas</span></button>
        <button class="text-gray-500 flex flex-col items-center"><span>Depósito</span></button>
        <button class="text-gray-500 flex flex-col items-center"><span>Saques</span></button>
        <button class="text-gray-500 flex flex-col items-center"><span>Perfil</span></button>
    </nav>
</body>
</html>
