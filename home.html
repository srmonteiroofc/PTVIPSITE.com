<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - PT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div style="background: linear-gradient(90deg, var(--vermelho-principal), #900000); padding:18px; border-radius:10px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center">
            <div>
                <p>Saldo disponível</p>
                <h3>R$ 250,00</h3>
            </div>
            <button class="botao" style="width:auto; padding:8px 16px; background:var(--dourado); color:#111">DEPOSITAR</button>
        </div>

        <div style="background:#1a1a28; border:1px solid var(--vermelho-principal); border-radius:8px; padding:12px; margin-bottom:20px">
            <h4 style="color:var(--dourado)">100% ATÉ R$1.000 + 200 GIROS</h4>
            <p style="font-size:13px; color:var(--cinza-claro)">Bônus de boas-vindas</p>
        </div>

        <h4 style="text-align:left; margin-bottom:10px">Jogos Populares</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px">
            <div style="background:#1a1a28; padding:20px; border-radius:8px; text-align:center">Fortune Tiger</div>
            <div style="background:#1a1a28; padding:20px; border-radius:8px; text-align:center">Sweet Bonanza</div>
            <div style="background:#1a1a28; padding:20px; border-radius:8px; text-align:center">Gates of Olympus</div>
            <div style="background:#1a1a28; padding:20px; border-radius:8px; text-align:center">Mega Wolf Gold</div>
        </div>

        <div class="menu-navegacao">
            <div class="nav-item ativo">Início</div>
            <div class="nav-item" onclick="irPara('jogos.html')">Jogos</div>
            <div class="nav-item" onclick="irPara('carteira.html')">Carteira</div>
            <div class="nav-item" onclick="irPara('perfil.html')">Perfil</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
