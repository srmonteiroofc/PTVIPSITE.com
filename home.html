<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
        .carousel-slide {
            display: none;
        }
        .carousel-slide.active {
            display: block;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col pb-24 select-none">

    <!-- HEADER SUPERIOR -->
    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-1.5">
            <!-- LOGO CORRIGIDA -->
            <img src="logo.png" alt="PTVIP" class="h-8 w-auto object-contain">
        </div>
        
        <div class="flex items-center gap-2.5">
            <div class="bg-[#0d121a] border border-gray-800 rounded-xl px-3 py-2 flex items-center gap-1.5">
                <span class="text-[10px] font-black text-gray-500 uppercase">BR</span>
                <span class="text-sm font-black text-gray-200">R$ 0,00</span>
            </div>
            <button onclick="window.location.href='depositar-metodo.html'" class="bg-[#ff0000] hover:bg-red-700 active:scale-95 text-white font-black text-xs px-4 py-2.5 rounded-xl uppercase tracking-wider transition-all shadow-lg shadow-red-600/20">
                Depositar
            </button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 w-full max-w-md mx-auto px-4 py-4 space-y-5">

        <!-- CARROSSEL -->
        <section class="relative w-full rounded-2xl overflow-hidden aspect-[16/9] shadow-2xl border border-gray-800/40">
            <div class="carousel-slide active h-full w-full relative bg-gradient-to-r from-red-950 to-black">
                <div class="absolute inset-0 bg-cover bg-center mix-blend-overlay opacity-60" style="background-image: url('assets/mines-banner.png');"></div>
            </div>
            <!-- Slides adicionais omitidos para brevidade, mantenha os seus originais -->
        </section>

        <!-- SEÇÃO: ORIGINAIS DA PTVIP -->
        <section class="space-y-3">
            <div class="flex items-center justify-between">
                <h3 class="text-sm font-black uppercase tracking-wider text-gray-200 flex items-center gap-1.5">
                    🕹️ Originais da PTVIP
                </h3>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <!-- JOGO: MINES -->
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden shadow-lg cursor-pointer active:scale-95 transition-all group">
                    <div class="aspect-[4/3] flex items-center justify-center bg-gray-900/50">
                        <img src="mines.png" alt="Mines" class="w-16 h-16 object-contain">
                    </div>
                    <div class="p-3 bg-[#141b26]/60">
                        <p class="font-black text-xs text-gray-200 tracking-wide">Mines</p>
                    </div>
                </div>

                <!-- JOGO: DOUBLE -->
                <div onclick="window.location.href='double.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden shadow-lg cursor-pointer active:scale-95 transition-all group">
                    <div class="aspect-[4/3] flex items-center justify-center bg-gray-900/50">
                        <img src="double.png" alt="Double" class="w-16 h-16 object-contain">
                    </div>
                    <div class="p-3 bg-[#141b26]/60">
                        <p class="font-black text-xs text-gray-200 tracking-wide">Double</p>
                    </div>
                </div>

                <!-- JOGO: CRASH -->
                <div onclick="window.location.href='jogos.html'" class="glass-card border border-gray-800/60 rounded-2xl overflow-hidden shadow-lg cursor-pointer active:scale-95 transition-all group col-span-2">
                    <div class="aspect-[21/9] flex items-center justify-center bg-gray-900/50">
                        <img src="crash.png" alt="Crash" class="w-20 h-20 object-contain">
                    </div>
                    <div class="p-3 bg-[#141b26]/60 flex justify-between items-center">
                        <p class="font-black text-xs text-gray-200 tracking-wide">Crash</p>
                        <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2.5 py-1 rounded-lg font-black uppercase">Jogar</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- LIVE: GRANDES VITÓRIAS -->
        <section class="glass-card rounded-2xl border border-gray-800/60 overflow-hidden shadow-xl">
            <div class="border-b border-gray-800/60 px-4 py-3 bg-[#141b26]/50">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Grandes Vitórias
                </h3>
            </div>
            <div class="divide-y divide-gray-800/40 text-xs">
                <div class="px-4 py-3 flex justify-between items-center bg-[#141b26]/20">
                    <div><p class="font-bold text-gray-200">Mines</p><p class="text-[10px] text-gray-500">Usuário: Rafa***</p></div>
                    <div class="text-right"><p class="text-emerald-400 font-black">R$ 340,00</p></div>
                </div>
            </div>
        </section>
    </main>

    <!-- NAVEGAÇÃO -->
    <nav class="bg-[#141b26] border-t border-gray-800/80 fixed bottom-0 left-0 right-0 py-2 px-4 flex justify-around items-center z-50 max-w-md mx-auto shadow-2xl">
        <button onclick="window.location.href='home.html'" class="flex flex-col items-center gap-1 text-red-500 font-bold text-[10px] w-16">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span>Começar</span>
        </button>
        <!-- Outros botões da nav... -->
    </nav>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        function changeSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(changeSlide, 3000);
    </script>
</body>
</html>
