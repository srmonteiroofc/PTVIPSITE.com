<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Selecionar Método</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center px-4 select-none">

    <!-- CARD PRINCIPAL DE DEPÓSITO -->
    <div class="w-full max-w-md glass-card border border-gray-800/80 rounded-3xl p-6 shadow-2xl relative">
        
        <!-- HEADER DO CARD COM SETA PARA HOME -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='home.html'" class="w-9 h-9 rounded-full bg-[#141b26] border border-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">Forma de Depósito</span>
            <div class="w-9"></div>
        </div>

        <!-- LOGO CENTRALIZADA -->
        <div class="w-full flex justify-center mb-8">
            <img src="logo.png" alt="PTvip" class="h-14 object-contain">
        </div>

        <p class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-wider text-center">Selecione o método de pagamento</p>

        <!-- OPÇÃO PIX DISPONÍVEL (ESTILO PREMIUM CLARO/ESCURO) -->
        <div onclick="window.location.href='depositar-valor.html'" class="w-full bg-[#0d121a] border border-amber-500/30 hover:border-amber-500 rounded-2xl p-4 flex items-center justify-between cursor-pointer transition-all shadow-lg shadow-amber-950/5 group">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500/10 border border-amber-500/20 rounded-xl flex items-center justify-center text-xl">
                    ⚡
                </div>
                <div class="text-left">
                    <h3 class="text-sm font-black text-gray-200 uppercase tracking-wide">Pix Instantâneo</h3>
                    <p class="text-[11px] text-gray-500 font-medium">Aprovação imediata • Sem taxas</p>
                </div>
            </div>
            <div class="text-amber-500 group-hover:translate-x-1 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
                </svg>
            </div>
        </div>

        <!-- NOTA DE SEGURANÇA -->
        <div class="mt-8 flex items-center justify-center gap-2 text-[10px] text-gray-600 font-bold uppercase tracking-wider">
            <span>🛡️ Ambiente 100% Criptografado e Seguro</span>
        </div>

    </div>

</body>
</html>
