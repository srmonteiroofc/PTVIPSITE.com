<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Processando Depósito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
        /* Animação personalizada de rotação suave */
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        .animate-spinner {
            animation: spinner 1.2s linear infinite;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center px-4 select-none">

    <!-- CARD PRINCIPAL DE PROCESSAMENTO -->
    <div class="w-full max-w-md glass-card border border-gray-800/80 rounded-3xl p-8 shadow-2xl relative text-center">
        
        <!-- LOGO CENTRALIZADA EM DESTAQUE -->
        <div class="w-full flex justify-center mb-8">
            <img src="logo.png" alt="PTvip" class="h-14 object-contain">
        </div>

        <!-- SPINNER EM GRADIENTE AMBAR (PREMIUM) -->
        <div class="relative w-20 h-20 mx-auto mb-8 flex items-center justify-center">
            <!-- Círculo de fundo fosco -->
            <div class="absolute inset-0 rounded-full border-4 border-gray-800/40"></div>
            <!-- Spinner ativo animado -->
            <div class="absolute inset-0 rounded-full border-4 border-t-amber-500 border-r-transparent border-b-transparent border-l-transparent animate-spinner"></div>
            <!-- Ícone ou detalhe no centro -->
            <span class="text-xl">⚡</span>
        </div>

        <!-- TEXTOS DE STATUS -->
        <div class="space-y-3">
            <h2 class="text-lg font-black uppercase tracking-wider text-gray-100">Verificando Depósito</h2>
            <p class="text-xs text-gray-400 max-w-xs mx-auto leading-relaxed">
                Estamos processando a sua transação junto à instituição financeira. Por favor, não feche esta página.
            </p>
        </div>

        <!-- BOX SUTIL DE VALOR EM VERIFICAÇÃO -->
        <div class="mt-6 bg-[#0d121a] border border-gray-800/60 rounded-2xl p-4 flex justify-between items-center">
            <div class="text-left">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Status atual</p>
                <p class="text-xs font-black text-amber-500 uppercase tracking-wide animate-pulse">Aguardando PIX...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Valor solicitado</p>
                <p id="valorProcessando" class="text-sm font-black text-white">R$ --,--</p>
            </div>
        </div>

        <!-- NOTA DE SEGURANÇA NO RODAPÉ DO CARD -->
        <div class="mt-8 pt-2 border-t border-gray-800/30 flex items-center justify-center gap-2 text-[9px] text-gray-600 font-bold uppercase tracking-widest">
            <span>🔒 Conexão Segura SSL Integrada</span>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Recupera e exibe o valor selecionado pelo usuário
            const valorSalvo = localStorage.getItem('valor_deposito');
            const txtValor = document.getElementById('valorProcessando');
            if (valorSalvo) {
                const valorFormatado = parseFloat(valorSalvo).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                txtValor.innerText = `R$ ${valorFormatado}`;
            } else {
                txtValor.innerText = "R$ 10,00";
            }

            // Redireciona automaticamente para a tela de sucesso após 4 segundos
            setTimeout(function() {
                window.location.href = 'depositar-sucesso.html';
            }, 4000);
        });
    </script>
</body>
</html>
