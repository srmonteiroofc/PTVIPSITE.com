<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Jogos Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        .gold-border { 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            transition: all 0.3s ease;
        }
        .game-card { 
            background: linear-gradient(145deg, #121212, #0a0a0a);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .game-card:hover { 
            transform: translateY(-6px); 
            border-color: #D4AF37;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15);
        }
        .sidebar-item { 
            border-left: 3px solid transparent; 
            opacity: 0.6; 
            transition: all 0.3s ease;
            background: #0a0a0a;
        }
        .sidebar-item.active { 
            opacity: 1; 
            border-color: #D4AF37; 
            background: rgba(212, 175, 55, 0.08);
        }
        .game-image {
            height: 120px;
            width: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .game-card:hover .game-image {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="pb-24">

    <div class="max-w-md mx-auto pt-6 px-4">
        <!-- Barra de busca -->
        <div class="mb-6">
            <input type="text" placeholder="🔍 Buscar jogos..." class="w-full bg-[#111] border border-neutral-800 rounded-xl p-3 text-sm focus:border-amber-500 outline-none transition">
        </div>

        <div class="flex gap-4 items-start">
            <!-- Menu lateral -->
            <div class="w-20 flex flex-col gap-3 shrink-0">
                <button class="sidebar-item active w-full py-4 rounded-lg text-xs font-bold text-center">Todos</button>
            </div>

            <!-- Grade de jogos -->
            <div id="gameGrid" class="flex-1 grid grid-cols-2 gap-4">
                <!-- Jogos serão carregados aqui -->
            </div>
        </div>
    </div>

    <!-- Barra de navegação inferior -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a] border-t border-neutral-900 h-16 flex justify-around items-center z-50">
        <a href="home.html" class="flex flex-col items-center text-gray-500 hover:text-white transition">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] mt-1">Início</span>
        </a>
        <a href="Jogos.html" class="flex flex-col items-center text-red-500 hover:text-red-400 transition">
            <span class="text-xl">🎮</span>
            <span class="text-[9px] mt-1">Jogos</span>
        </a>
        <a href="Depositar-valor.html" class="bg-red-600 p-3 rounded-full -mt-8 border-4 border-[#050505] shadow-lg shadow-red-900/40 hover:bg-red-700 transition">
            💳
        </a>
        <a href="Promocoes.html" class="flex flex-col items-center text-gray-500 hover:text-white transition">
            <span class="text-xl">🎁</span>
            <span class="text-[9px] mt-1">Promos</span>
        </a>
        <a href="Perfil.html" class="flex flex-col items-center text-gray-500 hover:text-white transition">
            <span class="text-xl">👤</span>
            <span class="text-[9px] mt-1">Perfil</span>
        </a>
    </div>

    <script>
        const gameGrid = document.getElementById('gameGrid');

        // Lista dos 3 jogos com seus links
        const jogos = [
            {
                nome: "Double",
                fornecedor: "Jogo Exclusivo",
                link: "double.html", // página do jogo Double
                imagem: "https://picsum.photos/200/150?random=1"
            },
            {
                nome: "Mines",
                fornecedor: "Jogo Exclusivo",
                link: "mines.html", // página do jogo Mines
                imagem: "https://picsum.photos/200/150?random=2"
            },
            {
                nome: "Crash",
                fornecedor: "Jogo Exclusivo",
                link: "crash.html", // página do jogo Crash
                imagem: "https://picsum.photos/200/150?random=3"
            }
        ];

        // Renderiza cada jogo na tela
        jogos.forEach(jogo => {
            gameGrid.innerHTML += `
                <a href="${jogo.link}" class="game-card gold-border block">
                    <img src="${jogo.imagem}" alt="${jogo.nome}" class="game-image">
                    <div class="p-3">
                        <h3 class="text-sm font-bold truncate">${jogo.nome}</h3>
                        <p class="text-[10px] text-gray-400 uppercase mt-1">${jogo.fornecedor}</p>
                    </div>
                </a>
            `;
        });
    </script>
</body>
</html>
