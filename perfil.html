<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col pb-24 select-none">

    <!-- HEADER SUPERIOR ULTRA CLEAN -->
    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-4 flex items-center justify-between sticky top-0 z-50">
        <button onclick="window.location.href='home.html'" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-sm font-black uppercase tracking-widest text-gray-400 mx-auto pr-6">Centro Pessoal</h1>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 w-full max-w-md mx-auto px-4 py-6 space-y-6">

        <!-- INFO USUÁRIO E SALDO EXPANDIDOS (COBRINDO O ESPAÇO) -->
        <div class="flex items-center justify-between bg-[#141b26]/50 p-4 rounded-2xl border border-gray-800/60">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-red-600/10 rounded-xl border border-gray-800 flex items-center justify-center text-2xl">
                    🐊
                </div>
                <div>
                    <div class="flex items-center gap-1">
                        <span id="userEmail" class="font-black text-base text-gray-200">Carregando...</span>
                    </div>
                    <p class="text-xs text-gray-500 font-medium mt-0.5">ID: #<span id="userId" class="font-mono">000000</span></p>
                </div>
            </div>
            
            <div class="bg-[#141b26] border border-gray-800 rounded-xl px-4 py-2.5 flex items-center gap-2 shadow-inner">
                <span class="text-[11px] font-black text-gray-500 uppercase">BR</span>
                <span class="text-base font-black text-gray-200">R$ 0,03</span>
                <span class="text-gray-500 text-sm cursor-pointer ml-1 hover:text-white transition-colors">🔄</span>
            </div>
        </div>

        <!-- BOTÕES DE OPERAÇÃO AMPLIADOS (LADO A LADO) -->
        <div class="grid grid-cols-2 gap-4 text-center text-sm font-bold text-gray-300">
            <div onclick="window.location.href='sacar.html'" class="glass-card border border-gray-800 p-4 rounded-2xl cursor-pointer hover:bg-[#141b26] transition-all flex flex-col items-center justify-center gap-2 shadow-lg">
                <div class="text-2xl">🎫</div>
                <p>Solicitar Saque</p>
            </div>
            <div onclick="window.location.href='depositar-metodo.html'" class="glass-card border border-gray-800 p-4 rounded-2xl cursor-pointer hover:bg-[#141b26] transition-all flex flex-col items-center justify-center gap-2 shadow-lg">
                <div class="text-2xl">👛</div>
                <p>Efetuar Depósito</p>
            </div>
        </div>

        <!-- BANNER DE DESTAQUE ADAPTADO (IMAGEM DO TIGRE) -->
        <div class="w-full rounded-2xl overflow-hidden border border-red-600/30 shadow-2xl shadow-red-950/20 bg-black relative group cursor-pointer" onclick="window.location.href='home.html'">
            <img src="logo.png" alt="PTvip Promo" class="w-full h-auto object-cover block group-hover:scale-105 transition-transform duration-300">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-4">
                <p class="text-yellow-400 font-black text-xs uppercase tracking-wider">JOGUE. VENÇA. SEJA VIP.</p>
            </div>
        </div>

        <!-- CARD VIP PREMIUM AMPLIADO -->
        <div class="glass-card border border-gray-800 rounded-2xl p-5 shadow-xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <span class="bg-red-600 text-white font-black text-[11px] px-3 py-1 rounded-full uppercase tracking-widest">Nível VIP</span>
                    <span class="text-xl font-black tracking-tight text-gray-200">V2</span>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase font-black tracking-wider text-gray-500">Bônus de Nível</p>
                    <p class="text-lg font-black text-emerald-400">R$ 15,00</p>
                </div>
            </div>

            <div class="space-y-2">
                <div class="w-full bg-[#0d121a] h-2.5 rounded-full overflow-hidden border border-gray-800">
                    <div class="bg-gradient-to-r from-red-600 to-red-500 h-full w-[75%] rounded-full"></div>
                </div>
                <div class="flex justify-between text-xs font-bold">
                    <span class="text-gray-400">30.283,62 / 40.000,00</span>
                    <span class="text-gray-500">Faltam <span class="text-red-500">9.716,38</span></span>
                </div>
            </div>
        </div>

    </main>

    <!-- BARRA DE NAVEGAÇÃO INFERIOR SINCRONIZADA -->
    <nav class="bg-[#141b26] border-t border-gray-800/80 fixed bottom-0 left-0 right-0 py-2 px-4 flex justify-around items-center z-50 max-w-md mx-auto shadow-2xl">
        <button onclick="window.location.href='home.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span>Começar</span>
        </button>
        <button onclick="window.location.href='promocoes.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm0 0h4m-4 0H8m12 3v7a2 2 0 01-2 2H6a2 2 0 01-2-2v-7m16 0H4"></svg>
            <span>Ofertas</span>
        </button>
        <button onclick="window.location.href='depositar-metodo.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            <span>Depósito</span>
        </button>
        <button onclick="window.location.href='sacar.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>Saques</span>
        </button>
        <button onclick="window.location.href='perfil.html'" class="flex flex-col items-center gap-1 text-red-500 font-bold text-[10px] w-16">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            <span>Perfil</span>
        </button>
    </nav>

    <!-- INTEGRADO INTEGRALMENTE AO FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAw_X2_5ntROLBDHj6TF_rFQj6Yra-ghxk",
            authDomain: "ptvip-teste.firebaseapp.com",
            projectId: "ptvip-teste",
            storageBucket: "ptvip-teste.firebasestorage.app",
            messagingSenderId: "407028833766",
            appId: "1:407028833766:web:79d7dbf7ee968944248a27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email.split('@')[0];
                document.getElementById('userId').innerText = user.uid.substring(0, 8).toUpperCase();
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
