<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


const firebaseConfig={

apiKey:
"AIzaSyAw_X2_5ntROLBDHj6TF_rFQj6Yra-ghxk",

authDomain:
"ptvip-teste.firebaseapp.com",

projectId:
"ptvip-teste",

storageBucket:
"ptvip-teste.firebasestorage.app",

messagingSenderId:
"407028833766",

appId:
"1:407028833766:web:79d7dbf7ee968944248a27"

};

const app=
initializeApp(firebaseConfig);

const auth=
getAuth(app);


onAuthStateChanged(

auth,

(user)=>{

if(user){

document
.getElementById(
"userEmail"
)

.innerHTML=

user.email
.split("@")[0];

}else{

window.location=
"index.html";

}

}

);


window.logout=
async()=>{

await signOut(auth);

window.location=
"index.html";

};

</script>
