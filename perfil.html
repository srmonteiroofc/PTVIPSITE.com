<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>PTvip - Perfil</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:
linear-gradient(
180deg,
#07111d,
#091625,
#07111d
);
}

.glass{

background:
rgba(18,28,40,.95);

border:
1px solid rgba(255,255,255,.05);

backdrop-filter:
blur(12px);

}

</style>

</head>

<body class="text-white min-h-screen pb-28">

<header
class="
sticky
top-0
z-50

bg-[#111827]

border-b

border-gray-800">

<div class="p-5 flex items-center">

<button
onclick="
window.location.href='home.html'
"

class="
text-gray-400">

✕

</button>

<h1
class="
flex-1

text-center

font-black">

CENTRO PESSOAL

</h1>

</div>

</header>


<main
class="
max-w-md

mx-auto

p-5

space-y-5">

<!-- PERFIL -->

<div
class="
glass

rounded-3xl

p-5">

<div
class="
flex

justify-between

items-center">

<div class="flex gap-4">

<div

class="
w-16

h-16

rounded-2xl

bg-amber-500/10

flex

items-center

justify-center">

👑

</div>

<div>

<h2

id="userEmail"

class="
font-black

text-xl">

Carregando

</h2>

<p
class="
text-gray-500">

ID #

<span id="userId">

000000

</span>

</p>

</div>

</div>

<div
class="
px-4

py-2

rounded-xl

bg-[#141b26]">

VIP 0

</div>

</div>

</div>


<!-- SALDO -->

<div
class="
glass

rounded-3xl

p-5">

<p class="text-gray-500">

Saldo Disponível

</p>

<h2

id="saldo"

class="
text-4xl

font-black

text-amber-500">

R$ 0,00

</h2>

</div>


<!-- AÇÕES -->

<div class="grid grid-cols-2 gap-4">

<button

onclick="
window.location.href='sacar.html'
"

class="
glass

rounded-3xl

p-6">

🎫

<p class="mt-2">

Solicitar Saque

</p>

</button>

<button

onclick="
window.location.href='depositar-metodo.html'
"

class="
glass

rounded-3xl

p-6">

👛

<p class="mt-2">

Efetuar Depósito

</p>

</button>

</div>


<!-- BANNER -->

<div
class="
rounded-3xl

overflow-hidden">

<img
src="logo.png">

</div>


<!-- VIP -->

<div
class="
glass

rounded-3xl

p-5">

<div class="flex justify-between">

<div>

<p class="text-red-500">

NÍVEL VIP

</p>

<h2 class="text-5xl font-black">

V0

</h2>

</div>

<div>

<p class="text-gray-500">

BÔNUS

</p>

<p class="text-emerald-400">

R$10

</p>

</div>

</div>

<div
class="
mt-5

h-2

rounded-full

bg-black">

<div

class="
w-0

h-full

bg-red-500">

</div>

</div>

<p
class="
mt-3

text-gray-500">

Conta nova

</p>

</div>


<!-- SAIR -->

<button

onclick="logout()"

class="
w-full

bg-red-600

py-4

rounded-3xl

font-black">

SAIR DA CONTA

</button>

</main>



<nav

class="
fixed

bottom-0

left-0

right-0

bg-[#111827]

border-t

border-gray-800

max-w-md

mx-auto">

<div class="flex justify-around py-3">

<button onclick="window.location.href='home.html'">
🏠
</button>

<button onclick="window.location.href='promocoes.html'">
🎁
</button>

<button onclick="window.location.href='depositar-metodo.html'">
📦
</button>

<button onclick="window.location.href='sacar.html'">
💰
</button>

<button class="text-red-500">
👤
</button>

</div>

</nav>



<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {

getAuth,

onAuthStateChanged,

signOut

}

from
"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


const firebaseConfig={

apiKey:"SUA_API",

authDomain:"SEU_DOMINIO",

projectId:"SEU_PROJETO",

storageBucket:"SEU_STORAGE",

messagingSenderId:"SEU_ID",

appId:"SEU_APP"

};


const app=
initializeApp(
firebaseConfig
);

const auth=
getAuth(
app
);


onAuthStateChanged(

auth,

(user)=>{

if(user){

document
.getElementById(
"userEmail"
)

.innerHTML=

user
.email

.split(
"@"
)

[0];


document
.getElementById(
"userId"
)

.innerHTML=

user
.uid

.substring(
0,
8
);

}else{

window.location=
"index.html";

}

}

);


window.logout=
async()=>{

await signOut(
auth
);

window.location=
"index.html";

};

</script>

</body>

</html>
