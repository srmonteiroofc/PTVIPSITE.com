<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PTVIP • Cadastro</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="logo">

<h1>

PT<span>VIP</span>

</h1>

<p>

JOGUE. VENÇA. SEJA VIP.

</p>

</div>


<div class="card">

<h2>

Criar Conta

</h2>

<p class="sub">

Cadastre seu e-mail e senha.

</p>


<input

id="email"

type="email"

placeholder="Digite seu e-mail"

>


<input

id="senha"

type="password"

placeholder="Digite sua senha"

>


<button

id="criar"

>

CONTINUAR

</button>


<button

class="outline"

onclick="window.location='index.html'"

>

VOLTAR

</button>


<div class="footer">

Ao continuar você aceita nossos termos.

</div>

</div>

</div>


<script
type="module"
src="firebase.js">

</script>

</body>

</html>
