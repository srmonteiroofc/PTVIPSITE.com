<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tela container">
        <h2>Criar conta</h2>
        <input type="text" placeholder="Nome completo">
        <input type="email" placeholder="E-mail">
        <input type="tel" placeholder="Telefone">
        <input type="password" placeholder="Senha">
        <input type="password" placeholder="Confirmar senha">
        <p style="font-size:13px; margin:10px 0; color:#ccc">Ao continuar, você concorda com nossos Termos e Política de Privacidade</p>
        <button class="btn vermelho" onclick="irPara('verificacao.html')">CRIAR CONTA</button>
        <p style="margin-top:15px">Já tem conta? <a href="login.html" style="color:#FFBB00">Entrar</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
