<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo escuro premium baseado no design do app */
        .bg-app-dark {
            background-color: #0b0b0b;
        }
        
        /* Gradiente dourado metálico para o logotipo e bordas */
        .gold-text-gradient {
            background: linear-gradient(135deg, #FFE082 0%, #D4AF37 50%, #8C6212 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Borda dourada luxo para o painel */
        .gold-box-border {
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: linear-gradient(180deg, #141414 0%, #0d0d0d 100%);
        }

        /* Gradiente vermelho premium para o botão */
        .btn-gradient-red {
            background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        /* Efeito de foco nos inputs */
        .input-premium:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="bg-app-dark text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md min-h-[640px] flex flex-col justify-between relative py-6 px-4">
        
        <div class="absolute top-2 left-4 z-20">
            <a href="index.html" class="text-xs text-gray-500 hover:text-white transition flex items-center gap-1">
                ✕ Voltar
            </a>
        </div>

        <div class="gold-box-border rounded-3xl p-6 shadow-2xl relative overflow-hidden my-auto w-full">
            
            <div class="flex flex-col items-center mb-6">
                <div class="flex items-center gap-1">
                    <h1 class="text-3xl font-black tracking-tight uppercase">
                        <span class="gold-text-gradient">PT</span><span class="text-red-600">vip</span>
                    </h1>
                    <span class="text-sm -mt-4">👑</span>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-amber-500/80 mt-1">
                    ★ JOGUE. VENÇA. SEJA VIP. ★
                </p>
            </div>

            <h2 class="text-xl font-black text-center text-gray-100 mb-5 tracking-wide">
                Bem-vindo!
            </h2>

            <form id="cadastroForm" class="space-y-4 relative z-10">
                <div>
                    <input type="text" id="nomeCompleto" placeholder="Nome completo" required
                        class="input-premium w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl px-4 py-3.5 text-sm text-gray-200 placeholder-gray-500 transition">
                </div>

                <div>
                    <input type="email" id="email" placeholder="E-mail" required
                        class="input-premium w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl px-4 py-3.5 text-sm text-gray-200 placeholder-gray-500 transition">
                </div>

                <div>
                    <input type="tel" id="telefone" placeholder="Telefone" required
                        class="input-premium w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl px-4 py-3.5 text-sm text-gray-200 placeholder-gray-500 transition">
                </div>

                <div>
                    <input type="password" id="senha" placeholder="Senha" required
                        class="input-premium w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl px-4 py-3.5 text-sm text-gray-200 placeholder-gray-500 transition">
                </div>

                <div>
                    <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required
                        class="input-premium w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl px-4 py-3.5 text-sm text-gray-200 placeholder-gray-500 transition">
                </div>

                <button type="submit" class="btn-gradient-red w-full py-3.5 rounded-xl font-black text-sm tracking-widest uppercase transition hover:brightness-110 active:scale-[0.99] mt-2">
                    CADASTRAR
                </button>
            </form>

            <div class="flex justify-between items-end mt-8 border-t border-neutral-900 pt-4 opacity-80 select-none pointer-events-none">
                <div class="text-2xl flex gap-1 animate-pulse">
                    🪙 🪙
                </div>
                <div class="text-5xl -mb-2">
                    🐅
                </div>
            </div>

        </div>

        <div class="text-center text-[9px] text-gray-600 uppercase tracking-widest mt-4">
            Acesso Restrito • Alta Classe
        </div>

    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
      // Se você for usar Auth do Firebase no futuro para registrar o usuário, você importará aqui:
      // import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAw_X2_5ntROLBDHj6TF_rFQj6Yra-ghxk",
        authDomain: "ptvip-teste.firebaseapp.com",
        projectId: "ptvip-teste",
        storageBucket: "ptvip-teste.firebasestorage.app",
        messagingSenderId: "407028833766",
        appId: "1:407028833766:web:79d7dbf7ee968944248a27",
        measurementId: "G-1XXWV7S8YH"
      };

      // Inicializa o Firebase
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);

      // Manipulação básica do formulário para redirecionamento após o clique
      document.getElementById('cadastroForm').addEventListener('submit', function(e) {
          e.preventDefault();
          
          // Validação simples de senha antes de avançar
          const senha = document.getElementById('senha').value;
          const confirmar = document.getElementById('confirmarSenha').value;
          
          if(senha !== confirmar) {
              alert("As senhas não coincidem!");
              return;
          }

          // Se tudo estiver certo, redireciona para a tela de verificação seguindo sua lógica original
          window.location.href = "verificacao.html";
      });
    </script>
</body>
</html>
