<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTVIP • Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: radial-gradient(circle, #1a1111 0%, #000000 100%);
            min-height: 100vh;
        }
        .glass-container { 
            background: #0d0d0d;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.3);
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-sm text-center">
        
        <div class="mb-8 flex justify-center">
            <img src="logo.png" alt="PTVIP" class="h-14 w-auto object-contain">
        </div>

        <div class="glass-container w-full border border-red-900/50 rounded-[24px] p-8 text-left flex flex-col gap-5">
            
            <div class="text-center mb-2">
                <h2 class="text-2xl font-black uppercase text-white">Criar Conta</h2>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Cadastre seu e-mail e senha.</p>
            </div>

            <form id="cadastroForm" class="space-y-4">
                <input type="email" id="email" placeholder="Digite seu e-mail" required 
                    class="w-full bg-[#1a1a1a] border border-neutral-800 rounded-xl p-4 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all text-white placeholder-gray-500">
                
                <div class="space-y-2">
                    <input type="password" id="senha" placeholder="Digite sua senha" required 
                        class="w-full bg-[#1a1a1a] border border-neutral-800 rounded-xl p-4 outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all text-white placeholder-gray-500">
                    
                    <div class="text-right">
                        <a href="recuperar.html" class="text-[10px] text-gray-500 hover:text-red-500 transition-colors uppercase">Esqueceu a senha?</a>
                    </div>
                </div>

                <button type="submit" id="criar" 
                    class="w-full py-4 bg-[#ff0000] hover:bg-red-700 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg shadow-red-900/20 active:scale-[0.98] transition-all">
                    Continuar
                </button>
                
                <button type="button" onclick="window.location.href='index.html'" 
                    class="w-full py-4 bg-white text-black rounded-xl font-black uppercase tracking-widest text-sm active:scale-[0.98] transition-all">
                    Voltar
                </button>
            </form>

            <div class="text-center text-gray-600 text-[10px] mt-2 uppercase">
                Ao continuar você aceita nossos termos.
            </div>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            if (senha.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            alert('Enviando dados para o cadastro...');
        });
    </script>
</body>
</html>
