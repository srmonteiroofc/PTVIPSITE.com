<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PT VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Criar Conta</h2>
        <input type="text" placeholder="Nome completo">
        <input type="email" placeholder="E-mail">
        <input type="tel" placeholder="Telefone">
        <input type="password" placeholder="Senha">
        <input type="password" placeholder="Confirmar senha">
        <p style="font-size:13px; margin:12px 0; color:var(--cinza-claro)">Ao continuar, você concorda com nossos Termos e Política de Privacidade</p>
        <button class="botao vermelho" onclick="irPara('verificacao.html')">CRIAR CONTA</button>
        <p style="text-align:center; margin-top:20px; color:var(--cinza-claro)">Já tem conta? <a href="login.html" style="color:var(--dourado); text-decoration:none">Entrar</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
