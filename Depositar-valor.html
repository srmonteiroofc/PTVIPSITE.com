<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Depósito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-app-dark { background-color: #070707; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .gold-text-gradient { background: linear-gradient(135deg, #FFE082 0%, #D4AF37 50%, #8C6212 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gradient-red { background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%); }
    </style>
</head>
<body class="bg-app-dark text-white font-sans min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-sm gold-border rounded-3xl p-6 bg-[#0f0f0f] shadow-2xl mt-4">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase"><span class="gold-text-gradient">PT</span><span class="text-red-600">vip</span></h1>
            <h2 class="text-sm font-bold mt-1 text-gray-300">Depósito Premium</h2>
        </div>

        <div class="mb-6">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3">Método de Pagamento</p>
            <div class="border-2 border-amber-500 rounded-xl p-4 bg-[#1a1a1a] flex items-center justify-between cursor-pointer">
                <span class="font-bold flex items-center gap-2">PIX <span class="text-[10px] bg-amber-500/20 text-amber-500 px-1.5 rounded">Rápido</span></span>
                <span class="text-amber-500 text-lg">✓</span>
            </div>
        </div>

        <div class="mb-6">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Informe o valor</p>
            <input type="text" value="R$ 0,00" class="w-full bg-[#1c1c1c] border border-neutral-800 rounded-xl p-4 text-center font-bold text-xl text-white outline-none focus:border-amber-500/50">
            <p class="text-[9px] text-neutral-600 text-center mt-2 uppercase">Mínimo R$ 10,00 • Máximo R$ 50.000,00</p>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-8">
            <button class="bg-[#1a1a1a] border border-neutral-800 py-3 rounded-lg text-sm font-bold text-gray-400">R$ 10</button>
            <button class="bg-[#1a1a1a] border border-amber-500/50 py-3 rounded-lg text-sm font-bold relative">
                R$ 30
                <span class="absolute -top-2 -right-1 bg-red-600 text-[8px] px-1 rounded uppercase font-black">Quente🔥</span>
            </button>
            <button class="bg-[#1a1a1a] border border-neutral-800 py-3 rounded-lg text-sm font-bold text-gray-400">R$ 50</button>
            
            <button class="bg-[#1a1a1a] border border-amber-500/50 py-3 rounded-lg text-sm font-bold relative">
                R$ 100
                <span class="absolute -top-2 -right-1 bg-red-600 text-[8px] px-1 rounded uppercase font-black">Quente🔥</span>
            </button>
            <button class="bg-[#1a1a1a] border border-neutral-800 py-3 rounded-lg text-sm font-bold text-gray-400">R$ 200</button>
            <button class="bg-[#1a1a1a] border border-amber-500/50 py-3 rounded-lg text-sm font-bold relative">
                R$ 500
                <span class="absolute -top-2 -right-1 bg-red-600 text-[8px] px-1 rounded uppercase font-black">Quente🔥</span>
            </button>
        </div>

        <button class="btn-gradient-red w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm mb-6">Continuar</button>
        
        <p class="text-center text-[9px] text-gray-700 uppercase tracking-widest">Acesso Restrito • Transação Criptografada</p>
    </div>

</body>
</html>
