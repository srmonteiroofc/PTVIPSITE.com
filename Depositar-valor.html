<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Valor - Depósito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Valor do Depósito</h2>
        <div class="valores-grid">
            <div class="valor-item" onclick="selecionarValor(this)">R$ 20</div>
            <div class="valor-item" onclick="selecionarValor(this)">R$ 50</div>
            <div class="valor-item ativo" onclick="selecionarValor(this)">R$ 100</div>
            <div class="valor-item" onclick="selecionarValor(this)">R$ 200</div>
            <div class="valor-item" onclick="selecionarValor(this)">R$ 500</div>
            <div class="valor-item" onclick="selecionarValor(this)">R$ 1.000</div>
        </div>
        <p style="text-align:center; color:var(--cinza-claro); margin:10px 0">Bônus: 100% até R$1.000 + 200 giros grátis</p>
        <button class="botao vermelho" onclick="irPara('depositar-metodo.html')">CONTINUAR</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
