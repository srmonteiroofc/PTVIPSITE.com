<button type="button" onclick="irParaPagamento()" class="btn-gradient-red w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm mb-6">Continuar</button>

<script>
    function irParaPagamento() {
        const valorInput = document.getElementById('valorInput').value;
        // Extrai apenas os números do input (ex: "R$ 50,00" vira "50")
        const valorNumerico = valorInput.replace(/[^\d]/g, '').slice(0, -2) || "10";
        window.location.href = `Depositar-processando.html?valor=${valorNumerico}`;
    }
</script>
