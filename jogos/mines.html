<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PTVIP Mines</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(
180deg,
#07111d,
#020912
);

font-family:Arial;
color:white;

padding:20px;
}

.topo{

display:flex;

justify-content:
space-between;

align-items:center;

margin-bottom:20px;

}

.logo{

font-size:24px;

font-weight:700;

color:#ff6d3d;

}

.saldo{

background:#06101f;

padding:15px;

border-radius:18px;

text-align:center;

}

.saldo span{

color:#00ff88;

font-size:34px;

font-weight:bold;

}

.box{

background:#07192e;

padding:18px;

border-radius:24px;

}

.linha{

display:flex;

gap:10px;

margin-bottom:15px;

}

select{

flex:1;

height:58px;

background:#14325f;

color:white;

border:none;

border-radius:18px;

padding-left:18px;

font-size:20px;

}

.multi{

width:130px;

background:#ffc700;

color:black;

font-weight:700;

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

}

.tabuleiro{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:10px;

}

.casa{

aspect-ratio:1;

background:
linear-gradient(
145deg,
#173d72,
#0d2445
);

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:32px;

transition:.2s;

}

.casa:hover{

transform:scale(.96);

}

input{

width:100%;

height:60px;

margin-top:16px;

background:#0c2346;

border:none;

border-radius:18px;

color:white;

font-size:26px;

text-align:center;

}

button{

width:100%;

height:64px;

margin-top:15px;

border:none;

border-radius:20px;

background:#4fe000;

color:white;

font-size:30px;

font-weight:700;

}

</style>

</head>

<body>

<div class="topo">

<div class="logo">
PTVIP
</div>

<div class="saldo">

SALDO

<br>

<span>

R$0,00

</span>

</div>

</div>

<div class="box">

<div class="linha">

<select id="minas">

<option value="3">
3 Minas
</option>

<option value="5">
5 Minas
</option>

<option value="7">
7 Minas
</option>

<option value="10">
10 Minas
</option>

</select>

<div
class="multi"
id="multi">

1.00x

</div>

</div>

<div
class="tabuleiro"
id="tabuleiro">

</div>

<input
value="R$1,00">

<button
id="apostar">

APOSTAR

</button>

</div>

<script src="mines.js"></script>

</body>

</html>
