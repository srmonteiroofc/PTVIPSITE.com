<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>PTVIP • Mines</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
180deg,
#07111d,
#020a12
);

color:white;

padding:18px;

}

.topo{

display:flex;

justify-content:
space-between;

align-items:center;

margin-bottom:18px;

}

.logo{

font-size:22px;

font-weight:900;

color:#ff6435;

}

.saldo{

background:#050d18;

padding:14px 18px;

border-radius:18px;

text-align:center;

}

.saldo b{

color:#00ff9d;

font-size:34px;

}

.box{

background:

linear-gradient(
180deg,
#081a30,
#071422
);

padding:16px;

border-radius:24px;

}

.linha{

display:flex;

gap:10px;

}

select{

flex:1;

height:60px;

background:#14315f;

border:none;

border-radius:18px;

color:white;

font-size:20px;

padding-left:18px;

}

.multi{

width:120px;

background:#ffc400;

color:black;

font-weight:900;

font-size:24px;

display:flex;

justify-content:center;

align-items:center;

border-radius:18px;

}

.tabuleiro{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:10px;

margin-top:16px;

}

.casa{

aspect-ratio:1;

border-radius:18px;

background:
linear-gradient(
145deg,
#173b70,
#0d2447
);

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

transition:.18s;

}

.casa:active{

transform:scale(.95);

}

.valor{

margin-top:18px;

height:60px;

width:100%;

border:none;

background:#0d2344;

border-radius:18px;

text-align:center;

color:white;

font-size:26px;

}

.botao{

margin-top:16px;

width:100%;

height:64px;

border:none;

border-radius:20px;

background:
linear-gradient(
90deg,
#46d500,
#5df000
);

font-size:28px;

font-weight:900;

color:white;

}

.botao2{

margin-top:12px;

width:100%;

height:58px;

border:none;

border-radius:18px;

background:#00c8ff;

font-size:22px;

font-weight:700;

color:white;

}

</style>

</head>

<body>

<div class="topo">

<div class="logo">

PTVIP

</div>

<div class="saldo">

SALDO

<br>

<b id="saldo">

R$0,00

</b>

</div>

</div>

<div class="box">

<div class="linha">

<select id="minas">

<option value="3">3 Minas</option>
<option value="5">5 Minas</option>
<option value="7">7 Minas</option>
<option value="10">10 Minas</option>

</select>

<div
class="multi"
id="multi">

1.00x

</div>

</div>

<div
class="tabuleiro"
id="tabuleiro">

</div>

<input
class="valor"
id="valor"
value="1">

<button
class="botao"
id="apostar">

APOSTAR

</button>

<button
class="botao2"
id="sacar">

SACAR

</button>

</div>

<script src="mines.js"></script>

</body>

</html>
