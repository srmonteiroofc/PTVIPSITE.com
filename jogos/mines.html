<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PTVIP • Mines</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
radial-gradient(
circle at top,
#17345c,
#07111d,
#02060c
);

color:white;

min-height:100vh;

padding:16px;

}

.topo{

display:flex;

justify-content:
space-between;

align-items:center;

margin-bottom:16px;

}

.voltar{

text-decoration:none;

color:#ff6b3d;

font-size:22px;

font-weight:900;

}

.saldo{

background:#06111d;

padding:14px;

border-radius:18px;

text-align:center;

width:120px;

}

.saldo span{

color:#00ff88;

font-size:22px;

font-weight:900;

}

.painel{

background:
linear-gradient(
180deg,
#13284a,
#081523
);

padding:18px;

border-radius:26px;

}

.controles{

display:flex;

gap:10px;

margin-bottom:14px;

}

select{

flex:1;

height:58px;

border:none;

border-radius:18px;

background:#163867;

color:white;

padding-left:16px;

font-size:18px;

}

.multi{

width:140px;

height:58px;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
90deg,
#ffbf00,
#ff8400
);

color:black;

font-size:24px;

font-weight:900;

border-radius:18px;

}

.status{

height:48px;

display:flex;

justify-content:center;

align-items:center;

margin-bottom:16px;

background:
rgba(255,255,255,.06);

border-radius:14px;

font-weight:900;

}

.tabuleiro{

display:grid;

grid-template-columns:
repeat(5,1fr);

gap:8px;

}

.casa{

aspect-ratio:1;

background:
linear-gradient(
180deg,
#214572,
#132b4f
);

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

transition:.2s;

}

.aberta{

background:
linear-gradient(
180deg,
#00ff99,
#009c5d
);

}

.bomba{

background:
linear-gradient(
180deg,
#ff2a2a,
#8f0000
);

}

.botao{

margin-top:18px;

width:100%;

height:66px;

border:none;

border-radius:22px;

background:
linear-gradient(
90deg,
#36d100,
#14ff77
);

color:#06111d;

font-size:22px;

font-weight:900;

}

</style>

</head>

<body>

<div class="topo">

<a
href="../home.html"
class="voltar">

← VOLTAR

</a>

<div class="saldo">

SALDO<br>

<span>R$0,00</span>

</div>

</div>

<div class="painel">

<div class="controles">

<select id="minas">

<option value="3">3 Minas</option>
<option value="5">5 Minas</option>
<option value="7">7 Minas</option>
<option value="10">10 Minas</option>

</select>

<div class="multi" id="multi">

1.10x

</div>

</div>

<div class="status" id="status">

APERTE APOSTAR

</div>

<div class="tabuleiro" id="tabuleiro">

</div>

<button
class="botao"
id="apostar">

APOSTAR

</button>

</div>

<script>

const tabuleiro=
document.getElementById(
"tabuleiro"
);

const botao=
document.getElementById(
"apostar"
);

const minas=
document.getElementById(
"minas"
);

const multi=
document.getElementById(
"multi"
);

const status=
document.getElementById(
"status"
);

let ativo=false;

let bombas=[];

let abertas=[];

let multiplicador=1.10;

for(
let i=0;
i<25;
i++
){

const casa=
document.createElement(
"div"
);

casa.className=
"casa";

casa.onclick=
()=>abrir(i);

tabuleiro.appendChild(
casa
);

}

const casas=
document.querySelectorAll(
".casa"
);

function gerarBombas(){

bombas=[];

while(
bombas.length<
Number(
minas.value
)
){

let n=
Math.floor(
Math.random()*25
);

if(
!bombas.includes(n)
){

bombas.push(n);

}

}

}

function iniciar(){

ativo=true;

abertas=[];

multiplicador=1.10;

multi.innerHTML=
"1.10x";

status.innerHTML=
"ABRA UMA CASA 💎";

botao.innerHTML=
"SACAR";

botao.style.background=
"linear-gradient(90deg,#ffbf00,#ff8400)";

casas.forEach(c=>{

c.className=
"casa";

c.innerHTML="";

});

gerarBombas();

}

function finalizar(){

ativo=false;

botao.innerHTML=
"APOSTAR";

botao.style.background=
"linear-gradient(90deg,#36d100,#14ff77)";

status.innerHTML=
"APERTE APOSTAR";

}

function revelar(){

bombas.forEach(i=>{

casas[i]
.innerHTML=
"💣";

casas[i]
.classList
.add(
"bomba"
);

});

}

function abrir(i){

if(
!ativo
)return;

if(
abertas.includes(i)
)return;

abertas.push(i);

if(
bombas.includes(i)
){

revelar();

status.innerHTML=
"💣 DERROTA";

setTimeout(
finalizar,
1000
);

return;

}

casas[i]
.innerHTML=
"💎";

casas[i]
.classList
.add(
"aberta"
);

multiplicador+=0.15;

multi.innerHTML=
multiplicador
.toFixed(2)
+"x";

status.innerHTML=
"💎 "
+
abertas.length
+
" abertas";

}

botao.onclick=
()=>{

if(
!ativo
){

iniciar();

}
else{

status.innerHTML=
"🎉 SACADO";

setTimeout(
finalizar,
800
);

}

};

</script>

</body>

</html>
