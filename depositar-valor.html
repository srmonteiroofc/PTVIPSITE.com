<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Depósito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
        /* Esconder setas nativas do input do tipo number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-center items-center px-4 select-none">

    <!-- CARD PRINCIPAL DE DEPÓSITO -->
    <div class="w-full max-w-md glass-card border border-gray-800/80 rounded-3xl p-6 shadow-2xl relative">
        
        <!-- HEADER DO CARD COM SETA PARA METODOS -->
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='depositar-metodo.html'" class="w-9 h-9 rounded-full bg-[#141b26] border border-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">Valor do Depósito</span>
            <div class="w-9"></div>
        </div>

        <!-- LOGO CENTRALIZADA EM DESTAQUE -->
        <div class="w-full flex justify-center mb-6">
            <img src="logo.png" alt="PTvip" class="h-14 object-contain">
        </div>

        <!-- MÉTODOS DE GATEWAY SELECIONÁVEIS -->
        <div class="space-y-3 mb-6">
            <p class="text-[11px] font-black text-gray-500 uppercase tracking-wider text-center">Selecione o Gateway de Pagamento</p>
            <div class="grid grid-cols-2 gap-3">
                
                <!-- PAYBROKERS -->
                <div id="gate-paybrokers" onclick="selecionarGateway('paybrokers')" class="border-2 border-amber-500 bg-amber-500/5 rounded-2xl p-4 text-center relative cursor-pointer transition-all">
                    <div id="check-paybrokers" class="absolute top-2 right-2 w-4 h-4 bg-amber-500 rounded-full flex items-center justify-center text-[9px] font-black text-gray-950">✓</div>
                    <div class="text-amber-500 font-black text-xs tracking-wider flex items-center justify-center gap-1 mb-1">
                        <span>❖</span> PIX
                    </div>
                    <p class="text-sm font-black text-white">Paybrokers</p>
                </div>

                <!-- ZROBANK -->
                <div id="gate-zrobank" onclick="selecionarGateway('zrobank')" class="border border-gray-800/60 bg-[#141b26]/20 rounded-2xl p-4 text-center cursor-pointer relative transition-all opacity-60">
                    <div id="check-zrobank" class="absolute top-2 right-2 w-4 h-4 bg-amber-500 rounded-full flex items-center justify-center text-[9px] font-black text-gray-950 hidden">✓</div>
                    <div class="text-gray-400 font-black text-xs tracking-wider flex items-center justify-center gap-1 mb-1 id-txt-pix">
                        <span>❖</span> PIX
                    </div>
                    <p class="text-sm font-black text-gray-400 id-txt-name">Zrobank</p>
                </div>

            </div>
        </div>

        <!-- BOX DE SELEÇÃO DE VALOR -->
        <div class="bg-[#0d121a] rounded-2xl p-5 border border-gray-800/80 shadow-inner space-y-4 mb-6">
            <div class="text-center space-y-1">
                <label id="labelValor" for="valorDeposito" class="text-[11px] font-black text-gray-500 uppercase tracking-wider block">Digite o valor desejado</label>
                <div class="relative flex items-center justify-center border border-gray-800 focus-within:border-amber-500/50 rounded-xl bg-[#141b26]/60 px-4 py-3.5 transition-colors">
                    <span class="text-xl font-black text-amber-500 mr-1">R$</span>
                    <input type="number" id="valorDeposito" placeholder="0,00" min="10" max="50000" step="any" class="w-full bg-transparent text-center text-2xl font-black text-white placeholder-gray-700 outline-none">
                </div>
                <div class="flex justify-between text-[10px] font-bold text-gray-600 pt-1 px-1">
                    <span>Mínimo: R$ 10,00</span>
                    <span>Máximo: R$ 50.000,00</span>
                </div>
            </div>

            <!-- VALORES RÁPIDOS PREDEFINIDOS -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="definirValor(10)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs relative transition-colors text-gray-300">
                    <span class="absolute -top-2 left-2 bg-amber-500 text-gray-950 text-[8px] font-black uppercase px-1.5 py-0.5 rounded tracking-wider scale-90">HOT</span>
                    R$ 10
                </button>
                <button onclick="definirValor(30)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs transition-colors text-gray-300">
                    R$ 30
                </button>
                <button onclick="definirValor(50)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs relative transition-colors text-gray-300">
                    <span class="absolute -top-2 left-2 bg-amber-500 text-gray-950 text-[8px] font-black uppercase px-1.5 py-0.5 rounded tracking-wider scale-90">HOT</span>
                    R$ 50
                </button>
                <button onclick="definirValor(100)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs transition-colors text-gray-300">
                    R$ 100
                </button>
                <button onclick="definirValor(300)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs transition-colors text-gray-300">
                    R$ 300
                </button>
                <button onclick="definirValor(1000)" class="border border-gray-800 bg-[#141b26]/40 hover:border-amber-500 py-3 rounded-xl font-black text-xs transition-colors text-gray-300">
                    R$ 1000
                </button>
            </div>
        </div>

        <!-- BOTÃO CONTINUAR PREMIUM -->
        <button onclick="processarDeposito()" class="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-gray-950 rounded-xl font-black uppercase tracking-wider text-xs transition-all shadow-lg shadow-amber-950/20 active:scale-[0.99]">
            Continuar para o Pagamento
        </button>

    </div>

    <script>
        const inputValor = document.getElementById('valorDeposito');
        let gatewaySelecionado = 'paybrokers';

        function definirValor(valor) {
            inputValor.value = valor;
        }

        // Sistema dinâmico para alternar entre os dois Pix
        function selecionarGateway(gateway) {
            gatewaySelecionado = gateway;
            
            const cardPay = document.getElementById('gate-paybrokers');
            const cardZro = document.getElementById('gate-zrobank');
            const checkPay = document.getElementById('check-paybrokers');
            const checkZro = document.getElementById('check-zrobank');

            if (gateway === 'paybrokers') {
                // Ativa Paybrokers
                cardPay.className = "border-2 border-amber-500 bg-amber-500/5 rounded-2xl p-4 text-center relative cursor-pointer transition-all";
                checkPay.classList.remove('hidden');
                
                // Desativa Zrobank
                cardZro.className = "border border-gray-800/60 bg-[#141b26]/20 rounded-2xl p-4 text-center cursor-pointer relative transition-all opacity-60";
                checkZro.classList.add('hidden');
            } else {
                // Ativa Zrobank
                cardZro.className = "border-2 border-amber-500 bg-amber-500/5 rounded-2xl p-4 text-center relative cursor-pointer transition-all";
                checkZro.classList.remove('hidden');
                
                // Desativa Paybrokers
                cardPay.className = "border border-gray-800/60 bg-[#141b26]/20 rounded-2xl p-4 text-center cursor-pointer relative transition-all opacity-60";
                checkPay.classList.add('hidden');
            }
        }

        function processarDeposito() {
            const valor = parseFloat(inputValor.value);

            if (isNaN(valor) || valor < 10) {
                alert('O valor mínimo de depósito é R$ 10,00.');
                inputValor.value = 10;
                return;
            }

            if (valor > 50000) {
                alert('O valor máximo permitido por transação é R$ 50.000,00.');
                inputValor.value = 50000;
                return;
            }

            // Salva o valor e o gateway escolhido
            localStorage.setItem('valor_deposito', valor);
            localStorage.setItem('gateway_selecionado', gatewaySelecionado);
            
            // Vai direto para os detalhes com a sua chave pix de teste
            window.location.href = 'depositar-detalhes.html';
        }
    </script>
</body>
</html>
