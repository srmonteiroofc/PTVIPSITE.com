<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Depósito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d121a;
        }
        .glass-card {
            background: rgba(24, 32, 44, 0.75);
            backdrop-filter: blur(8px);
        }
        /* Esconder setas nativas do input do tipo number */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col pb-24 select-none">

    <header class="bg-[#141b26] border-b border-gray-800/60 px-4 py-4 flex items-center justify-between sticky top-0 z-50">
        <button onclick="window.location.href='Depositar-metodo.html'" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <h1 class="text-md font-black uppercase tracking-widest text-gray-200">Pagamento PIX</h1>
        <div class="w-6"></div> 
    </header>

    <main class="flex-1 w-full max-w-md mx-auto px-4 py-6 space-y-6">

        <div class="space-y-3">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Método de pagamento selecionado</p>
            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-red-600 bg-red-600/10 rounded-2xl p-4 text-center relative cursor-pointer transition-all">
                    <div class="absolute top-2 right-2 w-4 h-4 bg-red-600 rounded-full flex items-center justify-center text-[10px] font-bold">✓</div>
                    <div class="text-emerald-400 font-black text-xs tracking-wider flex items-center justify-center gap-1 mb-1">
                        <span>❖</span> PIX
                    </div>
                    <p class="text-sm font-black text-white">Paybrokers</p>
                </div>

                <div class="border border-gray-800 bg-[#141b26]/40 rounded-2xl p-4 text-center opacity-50 cursor-not-allowed relative">
                    <div class="text-gray-400 font-black text-xs tracking-wider flex items-center justify-center gap-1 mb-1">
                        <span>❖</span> PIX
                    </div>
                    <p class="text-sm font-black text-gray-400">Zrobank</p>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 border border-gray-800/60 shadow-xl space-y-4">
            <div class="text-center space-y-1">
                <label for="valorDeposito" class="text-xs font-bold text-gray-400 uppercase tracking-wider">Digite o valor do depósito</label>
                <div class="relative flex items-center justify-center border-2 border-red-600/40 focus-within:border-red-600 rounded-2xl bg-[#0d121a] px-4 py-3 transition-colors">
                    <span class="text-xl font-black text-gray-400 mr-1">R$</span>
                    <input type="number" id="valorDeposito" placeholder="0,00" min="10" max="50000" step="any" class="w-full bg-transparent text-center text-2xl font-black text-white placeholder-gray-600 outline-none">
                </div>
                <div class="flex justify-between text-[10px] font-bold text-gray-500 pt-1 px-1">
                    <span>Mínimo: R$ 10,00</span>
                    <span>Máximo: R$ 50.000,00</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="definirValor(10)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs relative transition-colors">
                    <span class="absolute -top-2 -left-1 bg-red-600 text-[8px] font-black uppercase px-1 rounded text-white tracking-tight">HOT</span>
                    R$ 10
                </button>
                <button onclick="definirValor(30)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs transition-colors">
                    R$ 30
                </button>
                <button onclick="definirValor(50)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs relative transition-colors">
                    <span class="absolute -top-2 -left-1 bg-red-600 text-[8px] font-black uppercase px-1 rounded text-white tracking-tight">HOT</span>
                    R$ 50
                </button>
                <button onclick="definirValor(100)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs transition-colors">
                    R$ 100
                </button>
                <button onclick="definirValor(300)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs transition-colors">
                    R$ 300
                </button>
                <button onclick="definirValor(1000)" class="border border-gray-800 bg-[#0d121a] hover:border-red-500 py-3 rounded-xl font-black text-xs transition-colors">
                    R$ 1000
                </button>
            </div>
        </div>

        <button onclick="processarDeposito()" class="w-full py-4 bg-[#ff0000] hover:bg-red-700 active:scale-[0.99] text-white rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-red-600/10 transition-all">
            Continuar
        </button>

    </main>

    <nav class="bg-[#141b26] border-t border-gray-800/80 fixed bottom-0 left-0 right-0 py-2 px-4 flex justify-around items-center z-50 max-w-md mx-auto shadow-2xl">
        <button onclick="window.location.href='home.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span>Início</span>
        </button>
        <button onclick="window.location.href='Jogos.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span>Jogos</span>
        </button>
        <button onclick="window.location.href='promocoes.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5a2 2 0 10-2 2h2zm0 0h4m-4 0H8m12 3v7a2 2 0 01-2 2H6a2 2 0 01-2-2v-7m16 0H4"></path></svg>
            <span>Promoções</span>
        </button>
        <button onclick="window.location.href='Perfil.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-200 text-[10px] w-16 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 01-8 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span>Perfil</span>
        </button>
    </nav>

    <script>
        const inputValor = document.getElementById('valorDeposito');

        function definirValor(valor) {
            inputValor.value = valor;
        }

        function processarDeposito() {
            const valor = parseFloat(inputValor.value);

            if (isNaN(valor) || valor < 10) {
                alert('O valor mínimo de depósito é R$ 10,00.');
                inputValor.value = 10;
                return;
            }

            if (valor > 50000) {
                alert('O valor máximo permitido por transação é R$ 50.000,00.');
                inputValor.value = 50000;
                return;
            }

            // Salva o valor escolhido temporariamente no navegador para usar na próxima tela se precisar
            localStorage.setItem('valor_deposito', valor);

            // Envia o usuário direto para a sua tela de processamento do repositório
            window.location.href = 'Depositar-processando.html';
        }
    </script>
</body>
</html>
