<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Premium Portal</title>
    <!-- Tailwind CSS para agilidade e responsividade -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo escuro premium com textura sutil */
        .bg-luxury-pattern {
            background-color: #060606;
            background-image: radial-gradient(rgba(212, 175, 55, 0.08) 1px, transparent 0);
            background-size: 20px 20px;
        }
        
        /* Efeito de degradê dourado */
        .gold-text-gradient {
            background: linear-gradient(135deg, #FFF3B0 0%, #D4AF37 40%, #AA7C11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Borda fina dourada com efeito metálico */
        .gold-border-gradient {
            border: 1px solid transparent;
            background-image: linear-gradient(#0d0d0d, #0d0d0d), linear-gradient(135deg, #FFF3B0, #D4AF37, #593e10);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        /* Estilização dos campos de input baseados na imagem 3560.png */
        .luxury-input {
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .luxury-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
            outline: none;
        }

        /* Botão Vermelho Rubi Acetinado */
        .btn-red {
            background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.25);
            transition: all 0.3s ease;
        }
        .btn-red:hover {
            transform: translateY(-1px);
            filter: brightness(1.15);
        }

        /* Botão Ouro Nobre Escovado */
        .btn-gold {
            background: linear-gradient(180deg, #FFF3B0 0%, #D4AF37 50%, #966e12 100%);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Classes utilitárias para transição suave de telas */
        .screen-hidden {
            display: none !important;
        }
    </style>
</head>
<body class="bg-luxury-pattern min-h-screen flex items-center justify-center p-4 font-sans antialiased">

    <!-- Container Principal (Formato de Aplicativo Móvel) -->
    <div class="gold-border-gradient w-full max-w-sm bg-[#0d0d0d]/95 rounded-3xl p-8 relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.9)] flex flex-col items-center min-h-[580px] justify-between">
        
        <!-- Luzes difusas de ambiente ao fundo -->
        <div class="absolute -top-24 -left-24 w-52 h-52 bg-red-900/15 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-52 h-52 bg-yellow-600/10 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Botão Voltar (Surgirá apenas quando uma tela interna estiver aberta) -->
        <button id="btn-back" onclick="showScreen('main')" class="absolute top-5 left-5 text-gray-500 hover:text-white transition text-xs flex items-center gap-1 screen-hidden z-20">
            ✕ Voltar
        </button>

        <!-- ================= CADEÇALHO FIXO ================= -->
        <div class="text-center mt-2 w-full relative z-10 flex flex-col items-center">
            <!-- Ícone da Coroa Dourada -->
            <div class="mb-1">
                <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#luxuryGold)">
                    <defs>
                        <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFF3B0" />
                            <stop offset="50%" stop-color="#D4AF37" />
                            <stop offset="100%" stop-color="#735209" />
                        </linearGradient>
                    </defs>
                    <path d="M2 22h20v-2H2v2zm3-4h14v-2H5v2zm12-4.16l2.31-6.93-4.66 2.33L12 4l-2.65 5.24-4.66-2.33L7 13.84V15h10v-1.16z"/>
                </svg>
            </div>
            
            <!-- Título PTvip -->
            <h1 class="text-4xl font-black tracking-tight uppercase">
                <span class="gold-text-gradient">PT</span><span class="text-[#dc2626] drop-shadow-[0_2px_8px_rgba(220,38,38,0.3)]">vip</span>
            </h1>

            <!-- Slogan Fixo -->
            <p class="gold-text-gradient text-[9px] font-bold tracking-[0.3em] uppercase mt-2 opacity-90">
                ★ Jogue. Vença. Seja VIP. ★
            </p>
        </div>


        <!-- ================= TELA 1: HOME PRINCIPAL ================= -->
        <div id="screen-main" class="w-full space-y-4 my-auto z-10 pt-6">
            <!-- Botão Entrar -->
            <button onclick="showScreen('login')" class="btn-red w-full py-4 rounded-xl text-white font-bold text-base tracking-widest uppercase text-center cursor-pointer">
                Entrar
            </button>

            <!-- Divisor Sutil -->
            <div class="flex items-center justify-center my-4 opacity-40">
                <div class="h-[1px] bg-gradient-to-r from-transparent to-yellow-600 w-full"></div>
                <span class="px-3 text-[10px] text-gray-500 uppercase tracking-widest font-medium">ou</span>
                <div class="h-[1px] bg-gradient-to-l from-transparent to-yellow-600 w-full"></div>
            </div>

            <!-- Botão Criar Conta -->
            <button onclick="showScreen('register')" class="btn-gold w-full py-4 rounded-xl text-black font-black text-base tracking-widest uppercase text-center cursor-pointer">
                Criar Conta
            </button>
        </div>


        <!-- ================= TELA 2: FORMULÁRIO ENTRAR ================= -->
        <div id="screen-login" class="w-full space-y-4 my-auto z-10 pt-4 screen-hidden">
            <h2 class="text-center text-xl font-bold text-white mb-2">Bem-vindo!</h2>
            
            <form class="space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <input type="text" placeholder="Usuário ou E-mail" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-500 tracking-wide text-center">
                </div>
                <div>
                    <input type="password" placeholder="Senha" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-500 tracking-wide text-center">
                </div>
                <div class="pt-2">
                    <button type="submit" class="btn-red w-full py-3.5 rounded-xl text-white font-bold text-sm tracking-widest uppercase text-center">
                        ENTRAR
                    </button>
                </div>
            </form>
        </div>


        <!-- ================= TELA 3: FORMULÁRIO CRIAR CONTA ================= -->
        <div id="screen-register" class="w-full space-y-4 my-auto z-10 pt-4 screen-hidden">
            <h2 class="text-center text-xl font-bold text-white mb-2">Criar Conta VIP</h2>
            
            <form class="space-y-3" onsubmit="event.preventDefault();">
                <div>
                    <input type="text" placeholder="Usuário ou E-mail" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-500 tracking-wide text-center">
                </div>
                <div>
                    <input type="password" placeholder="Crie sua Senha" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-500 tracking-wide text-center">
                </div>
                <div>
                    <input type="password" placeholder="Confirme sua Senha" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-500 tracking-wide text-center">
                </div>
                <div class="pt-2">
                    <button type="submit" class="btn-gold w-full py-3.5 rounded-xl text-black font-black text-sm tracking-widest uppercase text-center">
                        CADASTRAR
                    </button>
                </div>
            </form>
        </div>


        <!-- ================= RODAPÉ EXCLUSIVO ================= -->
        <div class="w-full text-center text-[9px] text-gray-600 tracking-[0.2em] uppercase mt-4 z-10">
            Acesso Restrito • Alta Classe
        </div>

    </div>

    <!-- Lógica JavaScript para alternar telas dinamicamente -->
    <script>
        function showScreen(screenType) {
            // Esconde todas as telas primeiro
            document.getElementById('screen-main').classList.add('screen-hidden');
            document.getElementById('screen-login').classList.add('screen-hidden');
            document.getElementById('screen-register').classList.add('screen-hidden');
            document.getElementById('btn-back').classList.add('screen-hidden');

            // Mostra a tela selecionada
            if (screenType === 'main') {
                document.getElementById('screen-main').classList.remove('screen-hidden');
            } else if (screenType === 'login') {
                document.getElementById('screen-login').classList.remove('screen-hidden');
                document.getElementById('btn-back').classList.remove('screen-hidden');
            } else if (screenType === 'register') {
                document.getElementById('screen-register').classList.remove('screen-hidden');
                document.getElementById('btn-back').classList.remove('screen-hidden');
            }
        }
    </script>

</body>
</html>
