<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTvip - Login Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fundo escuro premium com textura sutil */
        .bg-luxury-pattern {
            background-color: #060606;
            background-image: radial-gradient(rgba(212, 175, 55, 0.08) 1px, transparent 0);
            background-size: 20px 20px;
        }
        
        /* Efeito de degradê dourado para textos e detalhes */
        .gold-text-gradient {
            background: linear-gradient(135deg, #FFF3B0 0%, #D4AF37 40%, #AA7C11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Borda fina dourada com efeito metálico em volta do card */
        .gold-border-gradient {
            border: 1px solid transparent;
            background-image: linear-gradient(#0d0d0d, #0d0d0d), linear-gradient(135deg, #FFF3B0, #D4AF37, #593e10);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        /* Estilização dos campos de input focados em alta classe */
        .luxury-input {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .luxury-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);
            outline: none;
        }

        /* Botão Entrar - Vermelho rubi acetinado */
        .btn-red {
            background: linear-gradient(180deg, #9b1111 0%, #5f0707 100%);
            border: 1px solid #7a0c0c;
            box-shadow: 0 4px 20px rgba(155, 17, 17, 0.25);
            transition: all 0.3s ease;
        }
        .btn-red:hover {
            transform: translateY(-1px);
            filter: brightness(1.15);
        }

        /* Botão Criar Conta - Ouro nobre escovado */
        .btn-gold {
            background: linear-gradient(180deg, #FFF3B0 0%, #D4AF37 50%, #966e12 100%);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body class="bg-luxury-pattern min-h-screen flex items-center justify-center p-4 font-sans antialiased">

    <div class="gold-border-gradient w-full max-w-sm bg-[#0d0d0d]/95 rounded-3xl p-8 relative overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.9)] flex flex-col items-center">
        
        <div class="absolute -top-24 -left-24 w-52 h-52 bg-red-900/15 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-52 h-52 bg-yellow-600/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mt-2 mb-1 relative">
            <div class="flex justify-center mb-2">
                <svg class="w-8 h-8 drop-shadow-md" viewBox="0 0 24 24" fill="url(#luxuryGold)">
                    <defs>
                        <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFF3B0" />
                            <stop offset="50%" stop-color="#D4AF37" />
                            <stop offset="100%" stop-color="#735209" />
                        </linearGradient>
                    </defs>
                    <path d="M2 22h20v-2H2v2zm3-4h14v-2H5v2zm12-4.16l2.31-6.93-4.66 2.33L12 4l-2.65 5.24-4.66-2.33L7 13.84V15h10v-1.16z"/>
                </svg>
            </div>
            
            <h1 class="text-4xl font-black tracking-tight uppercase">
                <span class="gold-text-gradient">PT</span><span class="text-[#dc2626] drop-shadow-[0_2px_8px_rgba(220,38,38,0.3)]">vip</span>
            </h1>
        </div>

        <p class="gold-text-gradient text-[10px] font-bold tracking-[0.25em] uppercase mb-8 opacity-90">
            Jogue. Vença. Seja VIP.
        </p>

        <form class="w-full space-y-5 z-10" onsubmit="event.preventDefault();">
            
            <div class="space-y-1.5">
                <label class="text-[11px] font-semibold tracking-wider text-gray-400 uppercase block pl-1">Usuário ou E-mail</label>
                <input type="text" placeholder="Digite seu acesso" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-600 tracking-wide">
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[11px] font-semibold tracking-wider text-gray-400 uppercase block">Senha</label>
                    <a href="#" class="text-[10px] text-yellow-600/80 hover:text-yellow-500 transition">Esqueceu?</a>
                </div>
                <input type="password" placeholder="••••••••" class="luxury-input w-full px-4 py-3.5 rounded-xl text-sm placeholder-gray-600 tracking-wide">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-red w-full py-4 rounded-xl text-white font-bold text-base tracking-widest uppercase text-center cursor-pointer">
                    Entrar
                </button>
            </div>

            <div class="flex items-center justify-center my-4 opacity-40">
                <div class="h-[1px] bg-gradient-to-r from-transparent to-yellow-600 w-full"></div>
                <span class="px-3 text-[10px] text-gray-500 uppercase tracking-widest font-medium">ou</span>
                <div class="h-[1px] bg-gradient-to-l from-transparent to-yellow-600 w-full"></div>
            </div>

            <button type="button" class="btn-gold w-full py-4 rounded-xl text-black font-black text-base tracking-widest uppercase text-center cursor-pointer">
                Criar Conta
            </button>

        </form>

        <div class="mt-8 text-center text-[9px] text-gray-600 tracking-[0.2em] uppercase">
            Acesso Restrito • Membros Selecionados
        </div>

    </div>

</body>
</html>
